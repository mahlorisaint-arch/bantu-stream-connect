    <!-- 5. FINAL INITIALIZATION SCRIPT: Orchestrates loading -->
    <script>
        (function() {
            // Ensure the DOM is fully loaded before any of our modules try to access elements
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initApp);
            } else {
                initApp();
            }

            async function initApp() {
                console.log('🎬 [Master Init] Starting application...');

                // --- STEP 1: Hide loading screen immediately for perceived speed ---
                const loadingScreen = document.getElementById('loading');
                const appElement = document.getElementById('app');
                if (loadingScreen) loadingScreen.style.display = 'none';
                if (appElement) appElement.style.display = 'block';

                // --- STEP 2: Wait for the core home feed to initialize (this sets up supabaseAuth, etc.) ---
                // The old initializeHomeFeed function now exists globally.
                if (typeof initializeHomeFeed === 'function') {
                    console.log('🎬 [Master Init] Running initializeHomeFeed()...');
                    // We don't need to await, just let it run. It will hydrate the old sections.
                    initializeHomeFeed().catch(err => console.error('HomeFeed init error:', err));
                } else {
                    console.warn('⚠️ initializeHomeFeed not found. Old sections may not load.');
                }

                // --- STEP 3: Initialize Shared Components (Theme, Sidebar, etc.) ---
                // This ensures the UI is ready before new modules try to add elements.
                if (typeof initSharedComponents === 'function') {
                    console.log('🎬 [Master Init] Running initSharedComponents()...');
                    await initSharedComponents();
                } else {
                    console.warn('⚠️ initSharedComponents not found.');
                }

                // --- STEP 4: Initialize all NEW modular sections ---
                // A small delay ensures the DOM is completely parsed and ready.
                // The modules themselves will check their own elements and load data.
                setTimeout(() => {
                    console.log('🎬 [Master Init] Initializing new modular sections...');
                    
                    // List of all new global modules from the extracted files
                    const modules = [
                        'HeroContent', 'ContinueWatching', 'CreatorOfTheWeek', 
                        'CommunityFavorites', 'ForYou', 'LatestGems', 'LiveNow', 
                        'TrendingNow', 'UpcomingEvents', 'Wavelets', 'BantuInk', 
                        'BantuWavesAfricaRising', 'BantuWavesMidnight', 'BantuWavesMusic', 
                        'BantuWavesPodcasts', 'BantuWavesSeries'
                    ];

                    modules.forEach(moduleName => {
                        if (window[moduleName] && typeof window[moduleName].init === 'function') {
                            console.log(`🎬 [Master Init] Initializing ${moduleName}...`);
                            window[moduleName].init().catch(err => {
                                console.error(`❌ [Master Init] Failed to init ${moduleName}:`, err);
                            });
                        } else {
                            // The modules might be self-initializing. If they are, we don't need to call init.
                            // Check if the module exists but has no init method, or doesn't exist.
                            if (window[moduleName]) {
                                console.log(`ℹ️ [Master Init] ${moduleName} is self-initializing.`);
                            } else {
                                console.warn(`⚠️ [Master Init] ${moduleName} not found on window.`);
                            }
                        }
                    });
                }, 100); // Small delay to ensure DOM is fully interactive
                
                console.log('🎬 [Master Init] Initialization sequence complete.');
            }
        })();
    </script>
