<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Trending Now - Bantu Stream Connect</title>
<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root {
  --deep-black: #0A0E12;
  --deep-navy: #0F172A;
  --soft-white: #F8FAFC;
  --slate-grey: #94A3B8;
  --bantu-blue: #1D4ED8;
  --warm-gold: #F59E0B;
  --error-color: #EF4444;
  --success-color: #10B981;
  --purple-glow: #8B5CF6;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #001F54 0%, #0A0E3F 50%, #000000 100%);
  color: var(--soft-white);
  min-height: 100vh;
  overflow-x: hidden;
}
/* skeleton loaders */
.skeleton {
  background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
  background-size: 200% 100%;
  animation: skeleton-loading 1.5s infinite;
  border-radius: 8px;
}
.skeleton-text { height: 16px; margin-bottom: 8px; }
.skeleton-title { height: 20px; margin-bottom: 10px; }
.skeleton-thumbnail { height: 180px; border-radius: 15px; }
@keyframes skeleton-loading {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.loading-screen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #001F54 0%, #0A0E3F 50%, #000000 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}
.spinner {
  width: 60px;
  height: 60px;
  border: 4px solid rgba(255, 255, 255, 0.1);
  border-radius: 50%;
  border-top-color: var(--warm-gold);
  animation: spin 1s linear infinite;
  margin-bottom: 20px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.glassmorphism {
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 16px;
}
.header-container {
  position: relative;
  min-height: 30vh;
  overflow: hidden;
}
.header-bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 20% 80%, var(--bantu-blue) 0%, transparent 50%),
              radial-gradient(circle at 80% 20%, #8B5CF6 0%, transparent 50%);
  opacity: 0.3;
}
.grid-pattern {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
  background-size: 30px 30px;
}
.main-header {
  position: relative;
  padding: 20px;
  z-index: 10;
}
.header-content {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  max-width: 1200px;
  margin: 0 auto;
}
.trending-title {
  display: flex;
  align-items: center;
  gap: 15px;
}
.fire-icon {
  font-size: 2.5rem;
  color: var(--warm-gold);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}
.title-text {
  font-family: 'Orbitron', sans-serif;
  font-size: 2.5rem;
  font-weight: 900;
  background: linear-gradient(135deg, var(--soft-white) 0%, var(--warm-gold) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 2px;
}
.header-actions {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}
.icon-btn {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.2);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.3s ease;
  font-size: 1.2rem;
  position: relative;
}
.icon-btn:hover {
  background: rgba(255, 255, 255, 0.2);
  transform: translateY(-2px);
}
.location-filter {
  padding: 10px 20px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 25px;
  color: var(--soft-white);
  font-family: 'Inter', sans-serif;
  font-size: 0.9rem;
  cursor: pointer;
}
.filter-section {
  position: relative;
  padding: 20px;
  max-width: 1200px;
  margin: 0 auto;
}
.filter-container {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding-bottom: 10px;
  scrollbar-width: thin;
}
.filter-chip {
  padding: 10px 20px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 25px;
  color: var(--soft-white);
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
}
.filter-chip.active {
  background: var(--warm-gold);
  color: var(--deep-black);
  font-weight: 600;
}
.main-content {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
}
.section { margin-bottom: 40px; }
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}
.section-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.8rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-icon { color: var(--warm-gold); }
.see-all-btn {
  padding: 8px 20px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.3s ease;
}
.content-horizontal-scroll {
  display: flex;
  gap: 20px;
  overflow-x: auto;
  padding-bottom: 20px;
}
.content-card, .gem-card, .shorts-card {
  flex: 0 0 300px;
  border-radius: 15px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  transition: all 0.3s ease;
  cursor: pointer;
  position: relative;
}
.content-card:hover, .gem-card:hover, .shorts-card:hover {
  transform: translateY(-10px);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
}
.card-thumbnail, .gem-thumbnail, .shorts-thumbnail {
  position: relative;
  height: 180px;
  overflow: hidden;
  background: linear-gradient(135deg, #1D4ED8, #8B5CF6);
}
.card-thumbnail img, .gem-thumbnail img, .shorts-thumbnail img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.3s ease;
}
.content-card:hover .card-thumbnail img { transform: scale(1.1); }
.duration-badge {
  position: absolute;
  bottom: 10px;
  right: 10px;
  padding: 4px 10px;
  background: rgba(0, 0, 0, 0.85);
  border-radius: 6px;
  font-size: 0.75rem;
  font-weight: 600;
  z-index: 2;
}
.badge.live { background: rgba(239, 68, 68, 0.9); }
.badge.viewers { background: rgba(0, 0, 0, 0.7); }
.card-content, .gem-content { padding: 20px; }
.card-title {
  font-weight: 600;
  margin-bottom: 10px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-creator {
  font-size: 0.9rem;
  color: var(--slate-grey);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.card-stats { display: flex; gap: 15px; font-size: 0.8rem; color: rgba(255,255,255,0.6); }
.verified-badge { color: var(--bantu-blue); font-size: 0.9rem; }
.recency-text { font-size: 0.75rem; color: var(--slate-grey); }
.card-actions {
  position: absolute;
  top: 10px;
  right: 10px;
  z-index: 10;
}
.action-menu-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(0,0,0,0.7);
  border: none;
  color: white;
  cursor: pointer;
  opacity: 0;
  transition: all 0.2s;
}
.content-card:hover .action-menu-btn,
.gem-card:hover .action-menu-btn,
.shorts-card:hover .action-menu-btn {
  opacity: 1;
}
.action-menu-dropdown {
  position: absolute;
  top: 40px;
  right: 0;
  background: rgba(15, 23, 42, 0.95);
  border-radius: 12px;
  min-width: 180px;
  display: none;
  z-index: 100;
}
.action-menu-dropdown.active { display: block; }
.action-menu-item {
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
}
.action-menu-item:hover { background: rgba(255,255,255,0.1); }
.featured-trend-card {
  position: relative;
  border-radius: 20px;
  overflow: hidden;
  height: 400px;
  margin-bottom: 30px;
}
.featured-bg {
  position: absolute;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
}
.featured-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
  padding: 30px;
}
.watch-now-btn {
  padding: 15px 40px;
  background: linear-gradient(135deg, var(--warm-gold), #f97316);
  border: none;
  border-radius: 12px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 15px;
}
.shorts-scroll {
  display: flex;
  gap: 15px;
  overflow-x: auto;
  padding-bottom: 20px;
}
.shorts-card { flex: 0 0 180px; }
.shorts-thumbnail { height: 320px; }
.shorts-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  padding: 15px;
  background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
}
.shorts-title { font-size: 0.9rem; font-weight: 600; }
/* Continue Watching bar */
.continue-watching-bar {
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  margin: 20px 20px 0 20px;
  padding: 15px 20px;
  display: flex;
  align-items: center;
  gap: 15px;
  flex-wrap: wrap;
  border: 1px solid rgba(255,215,0,0.3);
}
.progress-container { flex: 1; min-width: 200px; }
.progress-track {
  height: 6px;
  background: rgba(255,255,255,0.2);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  width: 0%;
  height: 100%;
  background: var(--warm-gold);
  transition: width 0.3s;
}
/* toast */
.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: 15px 25px;
  border-radius: 10px;
  color: white;
  font-weight: 500;
  z-index: 2000;
  animation: slideIn 0.3s ease;
}
.toast.success { background: linear-gradient(135deg, #10B981, #059669); }
@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}
.global-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: rgba(15, 23, 42, 0.95);
  backdrop-filter: blur(10px);
  display: flex;
  justify-content: space-around;
  padding: 15px 0;
  z-index: 100;
  border-top: 1px solid rgba(255, 255, 255, 0.1);
}
.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  color: var(--slate-grey);
  text-decoration: none;
  font-size: 0.8rem;
}
.nav-item.active { color: var(--warm-gold); }
.auth-modal, .search-modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 2000;
}
.auth-modal.active, .search-modal.active { display: flex; }
.auth-content {
  background: rgba(15, 23, 42, 0.9);
  border-radius: 20px;
  padding: 40px;
  max-width: 400px;
  text-align: center;
}
.search-input-container {
  position: relative;
  width: 100%;
  max-width: 600px;
}
.search-input {
  width: 100%;
  padding: 15px 45px;
  border-radius: 12px;
  background: rgba(15, 23, 42, 0.7);
  border: 1px solid rgba(255,255,255,0.1);
  color: white;
}
.search-suggestions {
  position: absolute;
  top: 100%;
  left: 0;
  width: 100%;
  background: rgba(15, 23, 42, 0.95);
  border-radius: 12px;
  margin-top: 5px;
  display: none;
  z-index: 100;
}
.search-suggestions.active { display: block; }
.suggestion-item {
  padding: 12px 15px;
  display: flex;
  gap: 10px;
  cursor: pointer;
}
.suggestion-item:hover { background: rgba(255,255,255,0.1); }
.notifications-panel {
  position: fixed;
  top: 0;
  right: -100%;
  width: 400px;
  height: 100%;
  background: rgba(15, 23, 42, 0.95);
  backdrop-filter: blur(10px);
  transition: right 0.3s;
  z-index: 1500;
}
.notifications-panel.active { right: 0; }
@media (max-width: 768px) {
  .title-text { font-size: 1.8rem; }
  .content-card, .gem-card { flex: 0 0 250px; }
  .shorts-card { flex: 0 0 140px; }
}
</style>
</head>

<script>
if (!window.supabaseClient) {
  window.supabaseClient = supabase.createClient('https://ydnxqnbjoshvxteevemc.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlkbnhxbmJqb3Nodnh0ZWV2ZW1jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc2MzI0OTMsImV4cCI6MjA3MzIwODQ5M30.NlaCCnLPSz1mM7AFeSlfZQ78kYEKUMh_Fi-7P_ccs_U');
}
let currentUser = null, allContent = [], continueWatching = [], userHistory = [], selectedFilter = 'All', isLoadingMore = false, offset = 100;
const filters = ['All', 'Music', 'Film & Series', 'Podcasts', 'Gaming', 'Comedy', 'Live', 'Rising Creators'];

function showToast(msg, type='info'){ let t=document.createElement('div');t.className=`toast ${type}`;t.innerText=msg;document.getElementById('toast-container').appendChild(t);setTimeout(()=>t.remove(),3000);}
function formatNumber(n){ if(n>=1e6) return (n/1e6).toFixed(1)+'M'; if(n>=1e3) return (n/1e3).toFixed(1)+'K'; return n;}
function formatDuration(sec){ if(!sec) return '0:00'; let m=Math.floor(sec/60), s=sec%60; return m+':'+(s<10?'0':'')+s;}
function buildThumbnail(url){ if(!url) return 'https://images.unsplash.com/photo-1611162617474-5b21e879e113?w=800&h=450&fit=crop'; if(url.startsWith('http')) return url; return 'https://ydnxqnbjoshvxteevemc.supabase.co/storage/v1/object/public/'+url.replace(/^\/+/,'');}
function isContentNew(created){ if(!created) return false; return (Date.now()-new Date(created).getTime())/(86400000)<7;}

async function fetchContent(offset=0,limit=100){
  let {data,error}=await window.supabaseClient.from('Content').select('*, user_profiles!user_id(*)').eq('status','published').order('created_at',{ascending:false}).range(offset,offset+limit-1);
  if(error) return [];
  for(let item of data){
    let {count}=await window.supabaseClient.from('content_views').select('*',{count:'exact',head:true}).eq('content_id',item.id);
    item.real_views = count || 0;
    item.is_new = isContentNew(item.created_at);
    item.duration = item.duration || 0;
  }
  return data;
}
async function loadContinueWatching(){
  if(!currentUser) return [];
  let {data}=await window.supabaseClient.from('watch_progress').select('*, Content(*)').eq('user_id',currentUser.id).eq('is_completed',false).order('updated_at',{ascending:false}).limit(5);
  return data || [];
}
function renderContinueBar(progressItems){
  if(!progressItems.length) return '';
  let item=progressItems[0];
  let percent = (item.last_position / (item.Content?.duration||1))*100;
  return `<div class="continue-watching-bar" data-content-id="${item.content_id}"><img src="${buildThumbnail(item.Content?.thumbnail_url)}" style="width:100px;height:56px;border-radius:8px;object-fit:cover"><div class="progress-container"><strong>Continue: ${escapeHtml(item.Content?.title)}</strong><div class="progress-track"><div class="progress-fill" style="width:${Math.min(100,percent)}%"></div></div><span style="font-size:0.8rem">${Math.floor(percent)}% complete</span></div><button class="watch-now-btn" style="padding:8px 20px" onclick="playContent('${item.content_id}')">Resume</button></div>`;
}
function renderFeatured(content){ if(!content) return ''; return `<div class="featured-trend-card" data-content-id="${content.id}"><div class="featured-bg" style="background-image:url('${buildThumbnail(content.thumbnail_url)}')"></div><div class="featured-overlay"><h2 class="featured-title">${escapeHtml(content.title)}</h2><div class="card-creator">@${escapeHtml(content.user_profiles?.username||'Creator')}<i class="fas fa-check-circle verified-badge"></i><span class="recency-text">${formatNotificationTime(content.created_at)}</span></div><button class="watch-now-btn" onclick="playContent('${content.id}')">WATCH NOW</button></div></div>`;}
function renderCards(list, type='horizontal'){ return list.map(c=>`<div class="content-card" data-content-id="${c.id}"><div class="card-thumbnail"><img src="${buildThumbnail(c.thumbnail_url)}" loading="lazy"><div class="duration-badge">${formatDuration(c.duration)}</div><div class="card-actions"><button class="action-menu-btn" onclick="event.stopPropagation();toggleMenu(event,'${c.id}')"><i class="fas fa-ellipsis-v"></i></button><div class="action-menu-dropdown" id="menu-${c.id}"><div class="action-menu-item" onclick="saveLater('${c.id}')"><i class="fas fa-clock"></i> Watch Later</div><div class="action-menu-item" onclick="shareContent('${c.id}')"><i class="fas fa-share"></i> Share</div></div></div></div><div class="card-content"><h3 class="card-title">${escapeHtml(c.title)}</h3><div class="card-creator">@${escapeHtml(c.user_profiles?.username||'Creator')} <span class="recency-text">• ${formatNotificationTime(c.created_at)}</span></div><div class="card-stats"><i class="fas fa-eye"></i> ${formatNumber(c.real_views)} <i class="fas fa-heart"></i> ${formatNumber(c.likes_count||0)}</div></div></div>`).join('');}
function renderShorts(list){ return list.map(s=>`<div class="shorts-card" data-content-id="${s.id}"><div class="shorts-thumbnail"><img src="${buildThumbnail(s.thumbnail_url)}"><div class="shorts-badge">SHORTS</div><div class="shorts-overlay"><div class="shorts-title">${escapeHtml(s.title)}</div><div class="shorts-stats"><i class="fas fa-eye"></i> ${formatNumber(s.real_views)}</div></div></div></div>`).join('');}
function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g,function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;});}
function formatNotificationTime(ts){ if(!ts) return 'recent'; let diff=Date.now()-new Date(ts).getTime(); let min=Math.floor(diff/60000); if(min<60) return min+'m'; if(min<1440) return Math.floor(min/60)+'h'; return Math.floor(min/1440)+'d';}
async function loadContentAndRender(){
  let content=await fetchContent(0,100);
  allContent=content;
  let featured=content.slice().sort((a,b)=>(b.real_views||0)-(a.real_views||0))[0];
  let liveStreams=content.filter(c=>c.is_live).slice(0,8);
  let gems=content.slice().sort((a,b)=>(b.real_views||0)+(b.likes_count||0)*2-(a.real_views||0)-(a.likes_count||0)*2).slice(0,12);
  let shorts=content.filter(c=>(c.duration||0)<60).slice(0,15);
  let personalized=[];
  if(userHistory.length && currentUser){
    let watchedGenres=[...new Set(userHistory.map(h=>h.Content?.genre).filter(Boolean))];
    personalized=content.filter(c=>watchedGenres.includes(c.genre) && !userHistory.some(h=>h.content_id===c.id)).slice(0,12);
  } else { personalized=content.slice(0,12); }
  let html='';
  if(featured) html+=`<section class="section"><div class="section-header"><h2 class="section-title"><i class="fas fa-rocket"></i> THE PULSE</h2></div>${renderFeatured(featured)}</section>`;
  if(personalized.length) html+=`<section class="section"><div class="section-header"><h2 class="section-title"><i class="fas fa-magic"></i> MADE FOR YOU</h2></div><div class="content-horizontal-scroll">${renderCards(personalized)}</div></section>`;
  if(liveStreams.length) html+=`<section class="section"><div class="section-header"><h2 class="section-title"><i class="fas fa-tv"></i> LIVE NOW</h2></div><div class="content-horizontal-scroll">${renderCards(liveStreams)}</div></section>`;
  if(gems.length) html+=`<section class="section"><div class="section-header"><h2 class="section-title"><i class="fas fa-gem"></i> COMMUNITY GEMS</h2></div><div class="community-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px">${renderCards(gems,'grid')}</div></section>`;
  document.getElementById('trending-sections').innerHTML=html;
  if(shorts.length){ document.getElementById('shorts-section').style.display='block'; document.getElementById('shorts-scroll').innerHTML=renderShorts(shorts); }
  else document.getElementById('shorts-section').style.display='none';
  setupCardListeners();
}
function setupCardListeners(){ document.querySelectorAll('[data-content-id]').forEach(el=>{ el.addEventListener('click',(e)=>{ if(e.target.closest('.action-menu-btn')) return; playContent(el.dataset.contentId); }); }); }
window.playContent=function(id){ window.location.href=`content-detail.html?id=${id}`; };
window.toggleMenu=function(e,id){ e.stopPropagation(); document.querySelectorAll('.action-menu-dropdown').forEach(d=>d.classList.remove('active')); let m=document.getElementById(`menu-${id}`); if(m) m.classList.toggle('active'); };
window.saveLater=function(id){ showToast('Added to Watch Later','success'); };
window.shareContent=function(id){ navigator.clipboard?.writeText(window.location.origin+`/content-detail.html?id=${id}`); showToast('Link copied','success'); };
async function loadNotifications(){ if(!currentUser) return; let {data}=await window.supabaseClient.from('notifications').select('*').eq('user_id',currentUser.id).order('created_at',{ascending:false}).limit(20); let unread=(data||[]).filter(n=>!n.is_read).length; let badge=document.getElementById('notification-count'); if(badge){ badge.innerText=unread>99?'99+':unread; badge.style.display=unread? 'flex':'none'; } }
async function init(){
  let {data:{session}}=await window.supabaseClient.auth.getSession();
  if(!session){ document.getElementById('auth-modal').classList.add('active'); document.getElementById('loading').style.display='none'; return; }
  currentUser=session.user;
  let {data:profile}=await window.supabaseClient.from('user_profiles').select('*').eq('id',currentUser.id).single();
  let placeholder=document.getElementById('userProfilePlaceholder'); if(placeholder) placeholder.innerHTML=profile?.avatar_url?`<img src="${buildThumbnail(profile.avatar_url)}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">`:`<div style="background:linear-gradient(135deg,#1D4ED8,#F59E0B);width:100%;height:100%;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold">${currentUser.email?.charAt(0).toUpperCase()||'U'}</div>`;
  await loadNotifications();
  let watchData=await window.supabaseClient.from('watch_progress').select('*, Content(genre)').eq('user_id',currentUser.id).limit(20); userHistory=watchData.data||[];
  continueWatching=await loadContinueWatching();
  if(continueWatching.length){ document.getElementById('continue-watching-container').innerHTML=renderContinueBar(continueWatching); document.getElementById('continue-watching-container').style.display='block'; }
  await loadContentAndRender();
  document.getElementById('loading').style.display='none'; document.getElementById('app').style.display='block';
  setupEvents();
}
function setupEvents(){
  document.getElementById('search-btn').onclick=()=>document.getElementById('search-modal').classList.add('active');
  document.getElementById('close-search-btn').onclick=()=>document.getElementById('search-modal').classList.remove('active');
  document.getElementById('refresh-btn').onclick=()=>{ loadContentAndRender(); showToast('Refreshed','success'); };
  document.getElementById('notifications-btn').onclick=()=>document.getElementById('notifications-panel').classList.add('active');
  document.getElementById('close-notifications').onclick=()=>document.getElementById('notifications-panel').classList.remove('active');
  document.getElementById('mark-all-read').onclick=async()=>{ if(currentUser){ await window.supabaseClient.from('notifications').update({is_read:true}).eq('user_id',currentUser.id).eq('is_read',false); loadNotifications(); showToast('All marked read'); } };
  document.getElementById('profile-btn').onclick=()=>window.location.href='profile.html';
  document.getElementById('explore-all-btn').onclick=()=>window.location.href='content-library.html?sort=trending';
  document.getElementById('viewAllShortsBtn').onclick=()=>window.location.href='content-library.html?type=shorts';
  document.getElementById('auth-login-btn').onclick=()=>window.location.href='login.html';
  document.getElementById('auth-cancel-btn').onclick=()=>document.getElementById('auth-modal').classList.remove('active');
  document.getElementById('location-filter').onchange=()=>{ showToast('Filter by region','info'); loadContentAndRender(); };
  // search suggestions
  let searchInput=document.getElementById('search-input');
  let suggestionsDiv=document.getElementById('search-suggestions');
  searchInput.addEventListener('input',(e)=>{
    let q=e.target.value.trim().toLowerCase();
    if(q.length<2){ suggestionsDiv.classList.remove('active'); return; }
    let matches=allContent.filter(c=>c.title?.toLowerCase().includes(q)).slice(0,5);
    if(!matches.length){ suggestionsDiv.classList.remove('active'); return; }
    suggestionsDiv.innerHTML=matches.map(m=>`<div class="suggestion-item" data-id="${m.id}"><i class="fas fa-search"></i> ${escapeHtml(m.title)}</div>`).join('');
    suggestionsDiv.classList.add('active');
    suggestionsDiv.querySelectorAll('.suggestion-item').forEach(el=>el.addEventListener('click',()=>{ let id=el.dataset.id; document.getElementById('search-modal').classList.remove('active'); playContent(id); }));
  });
  document.addEventListener('click',()=>{ document.querySelectorAll('.action-menu-dropdown').forEach(d=>d.classList.remove('active')); });
}
window.supabaseClient.auth.onAuthStateChange((event)=>{ if(event==='SIGNED_OUT') location.reload(); });
init();
</script>
</body>
</html>
