<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Trending Now - Bantu Stream Connect</title>
<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<!-- Supabase JS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --deep-black: #0A0E12;
  --deep-navy: #0F172A;
  --soft-white: #F8FAFC;
  --slate-grey: #94A3B8;
  --bantu-blue: #1D4ED8;
  --warm-gold: #F59E0B;
  --error-color: #EF4444;
  --success-color: #10B981;
  --purple-glow: #8B5CF6;
}

body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #001F54 0%, #0A0E3F 50%, #000000 100%);
  color: var(--soft-white);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Skeleton Loaders */
.skeleton {
  background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
  background-size: 200% 100%;
  animation: skeleton-loading 1.5s infinite;
  border-radius: 8px;
}
.skeleton-text { height: 16px; margin-bottom: 8px; width: 100%; }
.skeleton-title { height: 20px; margin-bottom: 10px; width: 80%; }
.skeleton-thumbnail { height: 180px; border-radius: 15px; }
.skeleton-avatar { width: 40px; height: 40px; border-radius: 50%; }
@keyframes skeleton-loading {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* Loading Screen */
.loading-screen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #001F54 0%, #0A0E3F 50%, #000000 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}
.spinner {
  width: 60px;
  height: 60px;
  border: 4px solid rgba(255, 255, 255, 0.1);
  border-radius: 50%;
  border-top-color: var(--warm-gold);
  animation: spin 1s linear infinite;
  margin-bottom: 20px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Glassmorphism */
.glassmorphism {
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 16px;
}

/* Header */
.header-container {
  position: relative;
  min-height: 30vh;
  overflow: hidden;
}
.header-bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 20% 80%, var(--bantu-blue) 0%, transparent 50%),
              radial-gradient(circle at 80% 20%, var(--purple-glow) 0%, transparent 50%);
  opacity: 0.3;
}
.grid-pattern {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
  background-size: 30px 30px;
}
.main-header {
  position: relative;
  padding: 20px;
  z-index: 10;
}
.header-content {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  max-width: 1200px;
  margin: 0 auto;
}
.trending-title {
  display: flex;
  align-items: center;
  gap: 15px;
}
.fire-icon {
  font-size: 2.5rem;
  color: var(--warm-gold);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.1); opacity: 0.9; }
}
.title-text {
  font-family: 'Orbitron', sans-serif;
  font-size: 2.5rem;
  font-weight: 900;
  background: linear-gradient(135deg, var(--soft-white) 0%, var(--warm-gold) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 2px;
}
.header-actions {
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
}

/* Location Filter */
.location-filter {
  padding: 10px 20px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 25px;
  color: var(--soft-white);
  font-family: 'Inter', sans-serif;
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.3s ease;
}
.location-filter:hover {
  background: rgba(255, 255, 255, 0.1);
  border-color: var(--warm-gold);
}

/* Icon Buttons */
.icon-btn {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.2);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.3s ease;
  font-size: 1.2rem;
  position: relative;
}
.icon-btn:hover {
  background: rgba(255, 255, 255, 0.2);
  transform: translateY(-2px);
}
.refresh-btn:hover {
  animation: rotate 0.5s ease;
}
@keyframes rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* Profile Button */
.profile-btn {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--bantu-blue), var(--warm-gold));
  border: 2px solid rgba(255, 255, 255, 0.2);
  cursor: pointer;
  overflow: hidden;
  transition: all 0.3s ease;
}
.profile-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(29, 78, 216, 0.3);
}
.profile-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, var(--bantu-blue), var(--warm-gold));
  color: white;
  font-size: 20px;
  font-weight: bold;
}
.profile-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Filter Section */
.filter-section {
  position: relative;
  padding: 20px;
  max-width: 1200px;
  margin: 0 auto;
}
.filter-container {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding-bottom: 10px;
  scrollbar-width: thin;
  scrollbar-color: var(--warm-gold) transparent;
}
.filter-container::-webkit-scrollbar {
  height: 4px;
}
.filter-container::-webkit-scrollbar-track {
  background: rgba(255, 255, 255, 0.05);
  border-radius: 10px;
}
.filter-container::-webkit-scrollbar-thumb {
  background: var(--warm-gold);
  border-radius: 10px;
}
.filter-chip {
  padding: 10px 24px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 30px;
  color: var(--soft-white);
  font-family: 'Inter', sans-serif;
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s ease;
  white-space: nowrap;
}
.filter-chip:hover {
  background: rgba(255, 255, 255, 0.15);
  transform: translateY(-2px);
}
.filter-chip.active {
  background: var(--warm-gold);
  border-color: transparent;
  color: var(--deep-black);
  font-weight: 700;
}

/* Main Content */
.main-content {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
}
.section {
  margin-bottom: 48px;
}
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}
.section-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--soft-white);
  display: flex;
  align-items: center;
  gap: 12px;
}
.section-icon {
  color: var(--warm-gold);
  font-size: 1.5rem;
}
.see-all-btn {
  padding: 8px 20px;
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 10px;
  color: var(--bantu-blue);
  font-family: 'Orbitron', sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
}
.see-all-btn:hover {
  background: rgba(255, 255, 255, 0.2);
  transform: translateX(5px);
}

/* Featured Card */
.featured-trend-card {
  position: relative;
  border-radius: 24px;
  overflow: hidden;
  height: 450px;
  margin-bottom: 30px;
  cursor: pointer;
}
.featured-bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  transition: transform 0.5s ease;
}
.featured-trend-card:hover .featured-bg {
  transform: scale(1.05);
}
.featured-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: linear-gradient(to top, rgba(0, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0.7) 50%, transparent 100%);
  padding: 40px 30px;
}
.live-badge {
  display: inline-block;
  padding: 6px 16px;
  background: rgba(239, 68, 68, 0.95);
  border-radius: 20px;
  color: white;
  font-weight: 700;
  font-size: 0.85rem;
  margin-bottom: 20px;
  animation: pulse-red 1.5s infinite;
}
@keyframes pulse-red {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}
.featured-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 2.5rem;
  font-weight: 800;
  color: white;
  margin-bottom: 12px;
  line-height: 1.2;
}
.featured-creator {
  font-size: 1.1rem;
  color: var(--warm-gold);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.verified-badge {
  color: var(--bantu-blue);
  font-size: 1rem;
}
.featured-stats {
  display: flex;
  gap: 20px;
  margin-bottom: 25px;
  color: rgba(255, 255, 255, 0.8);
  font-size: 0.9rem;
}
.recency-text {
  font-size: 0.85rem;
  color: var(--slate-grey);
  margin-left: 8px;
}
.watch-now-btn {
  padding: 14px 40px;
  background: linear-gradient(135deg, var(--warm-gold) 0%, #f97316 100%);
  border: none;
  border-radius: 12px;
  color: var(--deep-black);
  font-family: 'Inter', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.watch-now-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 25px rgba(245, 158, 11, 0.4);
}

/* Continue Watching Bar */
.continue-watching-bar {
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  margin-bottom: 30px;
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 20px;
  flex-wrap: wrap;
  border: 1px solid rgba(245, 158, 11, 0.3);
  cursor: pointer;
  transition: all 0.3s ease;
}
.continue-watching-bar:hover {
  transform: translateY(-2px);
  border-color: var(--warm-gold);
}
.continue-thumbnail {
  width: 120px;
  height: 68px;
  border-radius: 10px;
  object-fit: cover;
  flex-shrink: 0;
}
.progress-container {
  flex: 1;
  min-width: 200px;
}
.progress-track {
  height: 6px;
  background: rgba(255, 255, 255, 0.2);
  border-radius: 3px;
  overflow: hidden;
  margin: 8px 0;
}
.progress-fill {
  width: 0%;
  height: 100%;
  background: var(--warm-gold);
  transition: width 0.3s;
}

/* Content Cards */
.content-horizontal-scroll {
  display: flex;
  gap: 20px;
  overflow-x: auto;
  padding-bottom: 20px;
  scrollbar-width: thin;
  scrollbar-color: var(--warm-gold) transparent;
}
.content-horizontal-scroll::-webkit-scrollbar {
  height: 6px;
}
.content-horizontal-scroll::-webkit-scrollbar-track {
  background: rgba(255, 255, 255, 0.05);
  border-radius: 10px;
}
.content-horizontal-scroll::-webkit-scrollbar-thumb {
  background: var(--warm-gold);
  border-radius: 10px;
}
.content-card {
  flex: 0 0 300px;
  border-radius: 16px;
  overflow: hidden;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  transition: all 0.3s ease;
  cursor: pointer;
  position: relative;
}
.content-card:hover {
  transform: translateY(-8px);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
  border-color: rgba(245, 158, 11, 0.3);
}
.card-thumbnail {
  position: relative;
  height: 180px;
  overflow: hidden;
  background: linear-gradient(135deg, #1D4ED8, #8B5CF6);
}
.card-thumbnail img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.3s ease;
}
.content-card:hover .card-thumbnail img {
  transform: scale(1.1);
}
.card-thumbnail video {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
}
.content-card:hover .card-thumbnail video {
  opacity: 1;
}
.content-card:hover .card-thumbnail img {
  opacity: 0;
}
.thumbnail-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(to bottom, transparent 0%, rgba(0, 0, 0, 0.5) 100%);
}
.card-badges {
  position: absolute;
  top: 12px;
  left: 12px;
  display: flex;
  gap: 8px;
  z-index: 2;
}
.badge {
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 0.7rem;
  font-weight: 600;
}
.badge.live {
  background: rgba(239, 68, 68, 0.95);
  color: white;
}
.badge.upcoming {
  background: rgba(29, 78, 216, 0.95);
  color: white;
}
.badge.viewers {
  background: rgba(0, 0, 0, 0.75);
  color: white;
}
.badge.new {
  background: var(--success-color);
  color: white;
}
.duration-badge {
  position: absolute;
  bottom: 10px;
  right: 10px;
  padding: 4px 8px;
  background: rgba(0, 0, 0, 0.85);
  border-radius: 6px;
  color: white;
  font-size: 0.7rem;
  font-weight: 600;
  z-index: 2;
}
.card-content {
  padding: 16px;
}
.card-title {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 8px;
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-creator {
  font-size: 0.85rem;
  color: var(--slate-grey);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.card-stats {
  display: flex;
  gap: 12px;
  font-size: 0.75rem;
  color: rgba(255, 255, 255, 0.6);
  align-items: center;
}

/* Card Action Menu */
.card-actions {
  position: absolute;
  top: 10px;
  right: 10px;
  z-index: 15;
}
.action-menu-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: rgba(0, 0, 0, 0.7);
  border: none;
  color: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
  opacity: 0;
  backdrop-filter: blur(4px);
}
.content-card:hover .action-menu-btn,
.gem-card:hover .action-menu-btn {
  opacity: 1;
}
.action-menu-btn:hover {
  background: var(--warm-gold);
  color: var(--deep-black);
}
.action-menu-dropdown {
  position: absolute;
  top: 40px;
  right: 0;
  background: rgba(15, 23, 42, 0.98);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 12px;
  padding: 8px 0;
  min-width: 180px;
  display: none;
  z-index: 100;
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
}
.action-menu-dropdown.active {
  display: block;
}
.action-menu-item {
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  color: var(--soft-white);
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.2s ease;
}
.action-menu-item:hover {
  background: rgba(245, 158, 11, 0.2);
}
.action-menu-item i {
  width: 20px;
  text-align: center;
  color: var(--warm-gold);
}

/* Reminder Button */
.reminder-btn {
  width: 100%;
  padding: 10px;
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 8px;
  color: white;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  margin-top: 12px;
}
.reminder-btn:hover {
  background: rgba(245, 158, 11, 0.2);
  border-color: var(--warm-gold);
}

/* Community Gems Grid */
.community-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}
.gem-card {
  border-radius: 16px;
  overflow: hidden;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  transition: all 0.3s ease;
  cursor: pointer;
  position: relative;
}
.gem-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
  border-color: rgba(245, 158, 11, 0.3);
}
.gem-thumbnail {
  height: 160px;
  overflow: hidden;
  background: linear-gradient(135deg, #1D4ED8, #8B5CF6);
  position: relative;
}
.gem-thumbnail img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.3s ease;
}
.gem-card:hover .gem-thumbnail img {
  transform: scale(1.1);
}
.gem-content {
  padding: 16px;
}

/* Hashtags */
.hashtags-container {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 15px;
}
.hashtag {
  padding: 8px 20px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 30px;
  color: var(--warm-gold);
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.3s ease;
}
.hashtag:hover {
  background: rgba(245, 158, 11, 0.15);
  transform: translateY(-2px);
  border-color: var(--warm-gold);
}

/* Shorts Section */
.shorts-section {
  margin-bottom: 48px;
}
.shorts-scroll {
  display: flex;
  gap: 15px;
  overflow-x: auto;
  padding-bottom: 20px;
  scrollbar-width: thin;
}
.shorts-card {
  flex: 0 0 180px;
  border-radius: 16px;
  overflow: hidden;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  transition: all 0.3s ease;
  cursor: pointer;
  position: relative;
}
.shorts-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
}
.shorts-thumbnail {
  height: 320px;
  overflow: hidden;
  position: relative;
}
.shorts-thumbnail img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.3s ease;
}
.shorts-card:hover .shorts-thumbnail img {
  transform: scale(1.1);
}
.shorts-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  padding: 15px;
  background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, transparent 100%);
}
.shorts-title {
  font-size: 0.85rem;
  font-weight: 600;
  margin-bottom: 5px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.shorts-stats {
  font-size: 0.7rem;
  color: rgba(255, 255, 255, 0.7);
}
.shorts-badge {
  position: absolute;
  top: 10px;
  left: 10px;
  padding: 4px 10px;
  background: rgba(239, 68, 68, 0.95);
  border-radius: 8px;
  color: white;
  font-size: 0.7rem;
  font-weight: 700;
}

/* User Streak Badge */
.user-streak {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(245, 158, 11, 0.15);
  padding: 6px 14px;
  border-radius: 30px;
  font-size: 0.85rem;
  margin-left: 10px;
  cursor: pointer;
}
.user-streak i {
  color: var(--warm-gold);
  animation: flame-flicker 1s infinite;
}
@keyframes flame-flicker {
  0%, 100% { text-shadow: 0 0 2px #f59e0b; }
  50% { text-shadow: 0 0 8px #f97316; }
}

/* Explore All */

function showToast(message, type = 'info') {
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${message}`;
  const container = document.getElementById('toast-container');

function formatNumber(num) {
  if (num === undefined || num === null) return '0';
  if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
  if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
  return num.toString();
}

function formatDuration(seconds) {
  if (!seconds || seconds === 0) return '0:00';
  const hrs = Math.floor(seconds / 3600);
  const mins = Math.floor((seconds % 3600) / 60);
  const secs = Math.floor(seconds % 60);
  if (hrs > 0) {
    return `${hrs}:${mins < 10 ? '0' : ''}${mins}:${secs < 10 ? '0' : ''}${secs}`;
  }
  return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
}

function formatTimeAgo(timestamp) {
  if (!timestamp) return 'Just now';
  const diffMs = Date.now() - new Date(timestamp).getTime();
  const diffMins = Math.floor(diffMs / 60000);
  const diffHours = Math.floor(diffMs / 3600000);
  const diffDays = Math.floor(diffMs / 86400000);
  if (diffMins < 1) return 'Just now';
  if (diffMins < 60) return `${diffMins}m ago`;
  if (diffHours < 24) return `${diffHours}h ago`;
  if (diffDays < 7) return `${diffDays}d ago`;
  return new Date(timestamp).toLocaleDateString();
}

function isContentNew(createdAt) {
  if (!createdAt) return false;
  const daysAgo = (Date.now() - new Date(createdAt).getTime()) / (1000 * 60 * 60 * 24);

}

    'https://images.unsplash.com/photo-1585829365295-ab7cd400c167?w=800&h=450&fit=crop'
  ];
  if (!thumbnailPath || thumbnailPath.trim() === '') {
    return fallbackImages[0];
  }
  if (thumbnailPath.startsWith('http')) {
    return thumbnailPath;
  }
  const cleanPath = thumbnailPath.replace(/^\/+/, '');
  return `https://ydnxqnbjoshvxteevemc.supabase.co/storage/v1/object/public/${cleanPath}`;
}

function getInitials(name) {
  if (!name) return 'U';
  const parts = name.split(' ');
  if (parts.length >= 2) {
    return (parts[0].charAt(0) + parts[parts.length - 1].charAt(0)).toUpperCase();
  }
  return name.charAt(0).toUpperCase();
}

// ========== LOADING STATE ==========
function setLoading(loading, text) {
  const loadingScreen = document.getElementById('loading');
  const loadingText = document.getElementById('loading-text');
  const app = document.getElementById('app');
  if (text && loadingText) loadingText.textContent = text;
  if (loading) {
    if (loadingScreen) loadingScreen.style.display = 'flex';
    if (app) app.style.display = 'none';
  } else {
    setTimeout(() => {
      if (loadingScreen) loadingScreen.style.display = 'none';
      if (app) app.style.display = 'block';
    }, 500);
  }
}

// ========== AUTHENTICATION ==========
async function checkAuthentication() {
  setLoading(true, 'Checking authentication...');
  try {
    const { data: { session }, error } = await window.supabaseClient.auth.getSession();
    if (error || !session || !session.user) {
      console.log('⚠️ User not authenticated');
      showToast('Sign in for personalized trending content', 'info');
      document.getElementById('auth-modal').classList.add('active');
      setLoading(false);
      return false;
    }
    currentUser = session.user;

  } catch (error) {

    return false;
  }
}

// ========== FETCH CONTENT ==========
async function fetchContent(offset = 0, limit = CONTENT_LIMIT) {
  try {
    const { data, error } = await window.supabaseClient
      .from('Content')
      .select('*, user_profiles!user_id(*)')
      .eq('status', 'published')
      .order('created_at', { ascending: false })
      .range(offset, offset + limit - 1);
    if (error) {
      const { data: fallbackData, error: fallbackError } = await window.supabaseClient
        .from('content')
        .select('*, user_profiles!user_id(*)')
        .eq('status', 'published')
        .order('created_at', { ascending: false })
        .range(offset, offset + limit - 1);
      if (fallbackError) throw fallbackError;
      return await enrichWithViewCounts(fallbackData || []);
    }
    return await enrichWithViewCounts(data || []);
  } catch (error) {
    console.error('Error fetching content:', error);
    showToast('Failed to load content. Please refresh.', 'error');
    return [];
  }
}

async function enrichWithViewCounts(contentArray) {
  const enriched = [];
  for (const item of contentArray) {
    const { count } = await window.supabaseClient
      .from('content_views')
      .select('*', { count: 'exact', head: true })
      .eq('content_id', item.id);
    enriched.push({
      ...item,
      real_views: count || 0,
      is_new: isContentNew(item.created_at),
      duration: item.duration || 0,
      is_live: item.is_live || false
    });
  }
  return enriched;
}

// ========== PROCESS SECTIONS ==========
function processSections(contentData) {
  allContentData = contentData;
  const featured = [...contentData].sort((a, b) => (b.real_views || 0) - (a.real_views || 0))[0];
  const liveStreams = contentData.filter(c => c.is_live).slice(0, 10);
  const shorts = contentData.filter(c => (c.duration || 0) < 60).slice(0, 15);
  const communityGems = [...contentData]
    .sort((a, b) => ((b.real_views || 0) + (b.likes_count || 0) * 2) - ((a.real_views || 0) + (a.likes_count || 0) * 2))
    .slice(0, 12);
  const personalized = generatePersonalizedRow(contentData);
  return { featured, liveStreams, shorts, communityGems, personalized };
}

function generatePersonalizedRow(contentData) {
  if (!userProfile?.content_preferences?.length && !userStreak?.current_streak_days) {
    return contentData.slice(0, 12);
  }
  const preferredGenres = userProfile?.content_preferences || [];
  if (preferredGenres.length) {
    const genreMatches = contentData.filter(c => preferredGenres.includes(c.genre));
    if (genreMatches.length >= 4) return genreMatches.slice(0, 12);
  }
  return contentData.slice(0, 12);
}

// ========== EVENT HANDLERS ==========
function attachCardEventListeners() {
  document.querySelectorAll('[data-content-id]').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.closest('.action-menu-btn') || e.target.closest('.action-menu-dropdown')) return;
      playContent(card.dataset.contentId);
    });
  });
  document.querySelectorAll('.hashtag').forEach(tag => {
    tag.addEventListener('click', () => {
      window.location.href = `content-library.html?search=${encodeURIComponent(tag.dataset.hashtag)}`;
    });
  });
}

function attachHoverPreviews() {
  document.querySelectorAll('.card-thumbnail video').forEach(video => {
    const parent = video.closest('.content-card, .gem-card');
    if (!parent) return;
    const src = video.dataset.src;
    if (src) video.src = src;
    parent.addEventListener('mouseenter', () => {
      video.muted = true;
      video.play().catch(() => {});
    });
    parent.addEventListener('mouseleave', () => {
      video.pause();
      video.currentTime = 0;
    });
  });
}

window.playContent = function(contentId) {

  window.location.href = `content-detail.html?id=${contentId}`;
};

window.toggleActionMenu = function(event, contentId) {

window.shareContent = function(contentId) {

// ========== INFINITE SCROLL ==========
function setupInfiniteScroll() {
  window.addEventListener('scroll', async () => {
    if (isLoadingMore || !hasMoreContent) return;
    const scrollPosition = window.innerHeight + window.scrollY;
    const threshold = document.body.offsetHeight - 800;
    if (scrollPosition >= threshold) {
      await loadMoreContent();
    }
  });
}

async function loadMoreContent() {
  isLoadingMore = true;
  const loader = document.getElementById('infinite-scroll-loader');
  if (loader) loader.classList.add('active');
  contentOffset += CONTENT_LIMIT;
  const newContent = await fetchContent(contentOffset, CONTENT_LIMIT);
  if (newContent.length === 0) {
    hasMoreContent = false;
  } else {
    allContentData = [...allContentData, ...newContent];
    const sections = processSections(allContentData);
    renderShorts(sections.shorts);
    const gemsContainer = document.querySelector('.community-grid');
    if (gemsContainer && sections.communityGems.length) {
      gemsContainer.insertAdjacentHTML('beforeend', renderContentCards(sections.communityGems.slice(-newContent.length), false, true));
    }
    attachCardEventListeners();
    attachHoverPreviews();
  }
  if (loader) loader.classList.remove('active');
  isLoadingMore = false;
}

// ========== SEARCH FUNCTIONALITY ==========
function setupSearch() {
  const searchInput = document.getElementById('search-input');
  const suggestionsDiv = document.getElementById('search-suggestions');
  if (!searchInput) return;
  searchInput.addEventListener('input', (e) => {
    const query = e.target.value.trim();
    clearTimeout(searchDebounceTimer);
    if (query.length < 2) {
      suggestionsDiv.classList.remove('active');
      return;
    }
    searchDebounceTimer = setTimeout(() => {
      const matches = allContentData.filter(c => c.title?.toLowerCase().includes(query.toLowerCase())).slice(0, 5);
      if (!matches.length) {
        suggestionsDiv.classList.remove('active');
        return;
      }
      suggestionsDiv.innerHTML = matches.map(m => `<div class="suggestion-item" data-id="${m.id}"><i class="fas fa-search"></i> ${escapeHtml(m.title)}</div>`).join('');
      suggestionsDiv.classList.add('active');
      suggestionsDiv.querySelectorAll('.suggestion-item').forEach(el => {
        el.addEventListener('click', () => {
          document.getElementById('search-modal').classList.remove('active');
          playContent(el.dataset.id);
        });
      });
    }, 300);
  });
}

function setupEventListeners() {
  document.getElementById('search-btn')?.addEventListener('click', () => document.getElementById('search-modal').classList.add('active'));
  document.getElementById('close-search-btn')?.addEventListener('click', () => document.getElementById('search-modal').classList.remove('active'));
  document.getElementById('refresh-btn')?.addEventListener('click', async () => { await loadContentAndRender(); showToast('Content refreshed', 'success'); });
  document.getElementById('notifications-btn')?.addEventListener('click', () => document.getElementById('notifications-panel').classList.add('active'));
  document.getElementById('close-notifications')?.addEventListener('click', () => document.getElementById('notifications-panel').classList.remove('active'));
  document.getElementById('mark-all-read')?.addEventListener('click', markAllNotificationsRead);
  document.getElementById('profile-btn')?.addEventListener('click', () => window.location.href = 'profile.html');
  document.getElementById('explore-all-btn')?.addEventListener('click', () => window.location.href = 'content-library.html?sort=trending');
  document.getElementById('view-all-shorts')?.addEventListener('click', () => window.location.href = 'content-library.html?type=shorts');
  document.getElementById('location-filter')?.addEventListener('change', async () => { showToast('Filtering by region', 'info'); await loadContentAndRender(); });
  document.getElementById('auth-login-btn')?.addEventListener('click', () => window.location.href = 'login.html?redirect=trending_screen.html');
  document.getElementById('auth-cancel-btn')?.addEventListener('click', () => document.getElementById('auth-modal').classList.remove('active'));
  document.getElementById('search-modal')?.addEventListener('click', (e) => { if (e.target === document.getElementById('search-modal')) document.getElementById('search-modal').classList.remove('active'); });
  document.getElementById('notifications-panel')?.addEventListener('click', (e) => { if (e.target === document.getElementById('notifications-panel')) document.getElementById('notifications-panel').classList.remove('active'); });
}

// ========== MAIN LOAD FUNCTION ==========
async function loadContentAndRender() {
  setLoading(true, 'Loading trending content...');
  contentOffset = 0;
  hasMoreContent = true;
  const contentData = await fetchContent(0, CONTENT_LIMIT);
  const sections = processSections(contentData);
  renderFilterChips();
  renderTrendingSections(sections);
  renderShorts(sections.shorts);
  setLoading(false);
}

// ========== INITIALIZATION ==========
async function initialize() {
  console.log('🔥 Initializing Trending Screen...');
  const isAuth = await checkAuthentication();
  if (!isAuth) {
    setLoading(false);
    return;
  }
  setupEventListeners();
  setupSearch();
  setupInfiniteScroll();
  await loadContentAndRender();
  console.log('✅ Trending Screen initialized');
}

// Start
initialize();

// Auth state listener
window.supabaseClient.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN' && session?.user) {
    currentUser = session.user;
    loadUserProfile();
    loadUserStreak();
    loadNotifications();
    loadContinueWatching();
    loadContentAndRender();
    showToast('Welcome back!', 'success');
    document.getElementById('auth-modal')?.classList.remove('active');
  } else if (event === 'SIGNED_OUT') {
    currentUser = null;
    document.getElementById('userProfilePlaceholder').innerHTML = '<div class="profile-placeholder"><i class="fas fa-user"></i></div>';
    document.getElementById('user-streak').style.display = 'none';
    document.getElementById('auth-modal').classList.add('active');
  }
});
</script>
</body>
