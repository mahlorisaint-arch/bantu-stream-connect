<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Trending Now - Bantu Stream Connect</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Theme CSS (Matching content-detail) -->
    <style>
        /* ============================================ */
        /* COMPLETE STYLES - MATCHING CONTENT-DETAIL PAGE */
        /* PLATFORM CONSISTENCY: Header, Sidebar, Theme, Background */
        /* ============================================ */
        
        /* CSS VARIABLES & THEME SUPPORT */
        :root {
            --deep-black: #0A0E12;
            --deep-navy: #0F172A;
            --soft-white: #F8FAFC;
            --slate-grey: #94A3B8;
            --bantu-blue: #1D4ED8;
            --warm-gold: #F59E0B;
            --error-color: #EF4444;
            --success-color: #10B981;
            --purple-glow: #8B5CF6;
            --card-bg: rgba(15, 23, 42, 0.6);
            --card-border: rgba(148, 163, 184, 0.2);
            --ui-scale: 1;
        }

        .theme-light {
            --deep-black: #F8FAFC;
            --deep-navy: #FFFFFF;
            --soft-white: #0F172A;
            --slate-grey: #64748B;
            --card-bg: rgba(255, 255, 255, 0.9);
            --card-border: rgba(100, 116, 139, 0.2);
        }

        .theme-high-contrast {
            --deep-black: #000000;
            --deep-navy: #111827;
            --soft-white: #FFFFFF;
            --slate-grey: #E5E7EB;
            --warm-gold: #FFD700;
            --bantu-blue: #00BFFF;
            --card-bg: rgba(17, 24, 39, 0.95);
            --card-border: #FFFFFF;
        }

        html {
            font-size: calc(16px * var(--ui-scale));
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--deep-black);
            color: var(--soft-white);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
            width: 100%;
            max-width: 100vw;
            position: relative;
        }

        /* Animated Background - Matching content-detail */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .glow-cycle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: glow-move 20s infinite alternate;
        }

        .glow-1 {
            width: 400px;
            height: 400px;
            background: var(--bantu-blue);
            top: -100px;
            left: -100px;
        }

        .glow-2 {
            width: 300px;
            height: 300px;
            background: var(--warm-gold);
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }

        .glow-3 {
            width: 250px;
            height: 250px;
            background: var(--success-color);
            top: 50%;
            left: 50%;
            animation-delay: -10s;
        }

        .glow-4 {
            width: 350px;
            height: 350px;
            background: var(--purple-glow);
            bottom: 20%;
            left: 20%;
            animation-delay: -15s;
        }

        @keyframes glow-move {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* Loading Screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--deep-black);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .loading-screen .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(245, 158, 11, 0.2);
            border-top-color: var(--warm-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Header - Matching content-detail */
        .header {
            background: rgba(10, 14, 18, 0.9);
            backdrop-filter: blur(20px);
            padding: 0.75rem 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--card-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 3.75rem;
            width: 100%;
            max-width: 100vw;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
        }

        .menu-toggle {
            width: 2.375rem;
            height: 2.375rem;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--soft-white);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.2rem;
        }

        .menu-toggle:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .logo-icon {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 0.625rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            background: linear-gradient(to right, var(--soft-white), var(--bantu-blue));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            white-space: nowrap;
        }

        .header-actions {
            display: flex;
            gap: 0.625rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .icon-btn {
            width: 2.375rem;
            height: 2.375rem;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--soft-white);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            font-size: 1rem;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .notification-badge {
            position: absolute;
            top: -0.3125rem;
            right: -0.3125rem;
            background: var(--error-color);
            color: white;
            font-size: 0.625rem;
            font-weight: bold;
            width: 1.125rem;
            height: 1.125rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--deep-black);
        }

        .profile-switcher {
            position: relative;
        }

        .profile-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--card-border);
            border-radius: 2.5rem;
            padding: 0.3125rem 1rem 0.3125rem 0.3125rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            height: 2.75rem;
        }

        .profile-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--warm-gold);
        }

        .profile-placeholder {
            width: 2.25rem;
            height: 2.25rem;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--bantu-blue), var(--warm-gold));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.875rem;
            overflow: hidden;
        }

        .profile-name {
            color: var(--soft-white);
            font-size: 0.875rem;
            font-weight: 500;
            white-space: nowrap;
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .rsa-badge {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            background: linear-gradient(135deg, #007A4D, #FFB81C, #E03C31);
            padding: 0.375rem 0.75rem;
            border-radius: 1.875rem;
            color: white;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: 0.5rem;
        }

        /* Sidebar Menu - Matching content-detail */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .sidebar-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .sidebar-menu {
            position: fixed;
            top: 0;
            left: -20rem;
            width: 18rem;
            height: 100vh;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--card-border);
            z-index: 1001;
            transition: left 0.3s ease;
            display: flex;
            flex-direction: column;
            padding: 1.25rem;
        }

        .sidebar-menu.active {
            left: 0;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 1.25rem;
            border-bottom: 1px solid var(--card-border);
            margin-bottom: 1.25rem;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
        }

        .sidebar-logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--soft-white), var(--bantu-blue));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .sidebar-close {
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: var(--soft-white);
            cursor: pointer;
        }

        .sidebar-profile {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 0.75rem;
            margin-bottom: 1.25rem;
            cursor: pointer;
        }

        .sidebar-profile-avatar {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--bantu-blue), var(--warm-gold));
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .sidebar-profile-info {
            flex: 1;
        }

        .sidebar-profile-name {
            font-weight: 600;
            font-size: 0.875rem;
        }

        .sidebar-profile-email {
            font-size: 0.7rem;
            color: var(--slate-grey);
        }

        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .sidebar-nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            color: var(--soft-white);
            text-decoration: none;
            font-size: 0.875rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .sidebar-nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(0.25rem);
        }

        .sidebar-nav-item.active {
            background: linear-gradient(135deg, var(--bantu-blue), var(--warm-gold));
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 1.25rem;
            border-top: 1px solid var(--card-border);
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 100px;
        }

        /* Section Styles */
        .section {
            margin-bottom: 48px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-icon {
            color: var(--warm-gold);
        }

        .see-all-btn {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: var(--bantu-blue);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .see-all-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(5px);
        }

        /* Filter Chips */
        .filter-section {
            padding: 0 20px 20px;
        }

        .filter-container {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 10px;
            scrollbar-width: thin;
        }

        .filter-container::-webkit-scrollbar {
            height: 4px;
        }

        .filter-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .filter-container::-webkit-scrollbar-thumb {
            background: var(--warm-gold);
            border-radius: 10px;
        }

        .filter-chip {
            padding: 10px 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: var(--soft-white);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s ease;
        }

        .filter-chip:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .filter-chip.active {
            background: var(--warm-gold);
            color: var(--deep-black);
            font-weight: 700;
        }

        /* Content Horizontal Scroll */
        .content-horizontal-scroll {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 20px;
            scrollbar-width: thin;
        }

        .content-horizontal-scroll::-webkit-scrollbar {
            height: 6px;
        }

        .content-horizontal-scroll::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .content-horizontal-scroll::-webkit-scrollbar-thumb {
            background: var(--warm-gold);
            border-radius: 10px;
        }

        .content-card {
            flex: 0 0 280px;
            border-radius: 16px;
            overflow: hidden;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .content-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(245, 158, 11, 0.3);
        }

        .card-thumbnail {
            position: relative;
            height: 160px;
            overflow: hidden;
            background: linear-gradient(135deg, #1D4ED8, #8B5CF6);
        }

        .card-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .content-card:hover .card-thumbnail img {
            transform: scale(1.1);
        }

        .duration-badge {
            position: absolute;
            bottom: 10px;
            right: 10px;
            padding: 4px 8px;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            z-index: 2;
        }

        .badge {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
            z-index: 2;
        }

        .badge.live {
            background: rgba(239, 68, 68, 0.95);
            color: white;
        }

        .badge.new {
            background: var(--success-color);
            color: white;
        }

        .card-content {
            padding: 12px;
        }

        .card-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-creator {
            font-size: 0.75rem;
            color: var(--slate-grey);
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .card-stats {
            display: flex;
            gap: 12px;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .verified-badge {
            color: var(--bantu-blue);
            font-size: 0.7rem;
        }

        .recency-text {
            font-size: 0.65rem;
            color: var(--slate-grey);
        }

        /* Featured Card */
        .featured-trend-card {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            height: 450px;
            margin-bottom: 30px;
            cursor: pointer;
        }

        .featured-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: transform 0.5s ease;
        }

        .featured-trend-card:hover .featured-bg {
            transform: scale(1.05);
        }

        .featured-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0.7) 50%, transparent 100%);
            padding: 30px;
        }

        .live-badge {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(239, 68, 68, 0.95);
            border-radius: 20px;
            color: white;
            font-weight: 700;
            font-size: 0.85rem;
            margin-bottom: 15px;
            animation: pulse-red 1.5s infinite;
        }

        @keyframes pulse-red {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .featured-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 10px;
            line-height: 1.2;
        }

        .featured-creator {
            font-size: 1rem;
            color: var(--warm-gold);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .featured-stats {
            display: flex;
            gap: 20px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 20px;
        }

        .watch-now-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, var(--warm-gold), #f97316);
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .watch-now-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(245, 158, 11, 0.4);
        }

        /* Community Grid */
        .community-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .gem-card {
            border-radius: 16px;
            overflow: hidden;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .gem-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
            border-color: rgba(245, 158, 11, 0.3);
        }

        .gem-thumbnail {
            height: 160px;
            overflow: hidden;
            position: relative;
        }

        .gem-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .gem-card:hover .gem-thumbnail img {
            transform: scale(1.1);
        }

        .gem-content {
            padding: 12px;
        }

        /* Hashtags */
        .hashtags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 10px;
        }

        .hashtag {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: var(--warm-gold);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .hashtag:hover {
            background: rgba(245, 158, 11, 0.15);
            transform: translateY(-2px);
            border-color: var(--warm-gold);
        }

        /* Shorts Section */
        .shorts-section {
            margin-bottom: 48px;
        }

        .shorts-scroll {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 20px;
            scrollbar-width: thin;
        }

        .shorts-scroll::-webkit-scrollbar {
            height: 6px;
        }

        .shorts-card {
            flex: 0 0 180px;
            border-radius: 16px;
            overflow: hidden;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .shorts-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
        }

        .shorts-thumbnail {
            height: 320px;
            position: relative;
            overflow: hidden;
        }

        .shorts-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .shorts-card:hover .shorts-thumbnail img {
            transform: scale(1.1);
        }

        .shorts-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 12px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9), transparent);
        }

        .shorts-title {
            font-size: 0.85rem;
            font-weight: 600;

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            if (!container) return;
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle';

        function formatNumber(num) {
            if (num === undefined || num === null) return '0';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        function formatDuration(seconds) {
            if (!seconds || seconds === 0) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        function formatTimeAgo(timestamp) {
            if (!timestamp) return 'Just now';
            const diffMs = Date.now() - new Date(timestamp).getTime();
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);
            if (diffMins < 1) return 'Just now';
            if (diffMins < 60) return `${diffMins}m ago`;
            if (diffHours < 24) return `${diffHours}h ago`;
            if (diffDays < 7) return `${diffDays}d ago`;
            return new Date(timestamp).toLocaleDateString();
        }

        function isContentNew(createdAt) {
            if (!createdAt) return false;
            const daysAgo = (Date.now() - new Date(createdAt).getTime()) / (1000 * 60 * 60 * 24);
            return daysAgo < 7;

        function applyTheme(theme) {
            document.documentElement.classList.remove('theme-dark', 'theme-light', 'theme-high-contrast');
            document.documentElement.classList.add(`theme-${theme}`);
            localStorage.setItem('bantu_theme', theme);
            
            // Update active state on theme options
            document.querySelectorAll('.theme-option').forEach(option => {
                if (option.dataset.theme === theme) {
                    option.style.background = 'rgba(245, 158, 11, 0.2)';
                } else {
                    option.style.background = '';
                }
            });
        }

        function initThemeSelector() {
            const savedTheme = localStorage.getItem('bantu_theme') || 'dark';
            applyTheme(savedTheme);
            
            const themeToggle = document.getElementById('sidebar-theme-toggle');
            const themeSelector = document.getElementById('theme-selector');
            
            if (themeToggle && themeSelector) {
                themeToggle.addEventListener('click', (e) => {
                    e.stopPropagation();
                    themeSelector.classList.toggle('active');
                });
                
                document.querySelectorAll('.theme-option').forEach(btn => {
                    btn.addEventListener('click', () => {
                        applyTheme(btn.dataset.theme);
                        themeSelector.classList.remove('active');
                        showToast(`Theme changed to ${btn.dataset.theme}`, 'success');
                    });
                });
                
                document.addEventListener('click', (e) => {
                    if (!themeSelector.contains(e.target) && !themeToggle.contains(e.target)) {
                        themeSelector.classList.remove('active');
                    }
                });
            }

        function setupSidebar() {

            const sidebarClose = document.getElementById('sidebar-close');
            const sidebarOverlay = document.getElementById('sidebar-overlay');
            const sidebarMenu = document.getElementById('sidebar-menu');
            
            function openSidebar() {
                sidebarMenu.classList.add('active');
                sidebarOverlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            }
            
            function closeSidebar() {
                sidebarMenu.classList.remove('active');
                sidebarOverlay.classList.remove('active');
                document.body.style.overflow = '';
            }
            
            if (menuToggle) menuToggle.addEventListener('click', openSidebar);
            if (navMenuBtn) navMenuBtn.addEventListener('click', openSidebar);
            if (sidebarClose) sidebarClose.addEventListener('click', closeSidebar);
            if (sidebarOverlay) sidebarOverlay.addEventListener('click', closeSidebar);
            
            // ESC key to close
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && sidebarMenu.classList.contains('active')) {
                    closeSidebar();
                }
            });

            }
            
            try {
                const { data: profile, error } = await window.supabaseClient
                    .from('user_profiles')
                    .select('full_name, username, avatar_url')
                    .eq('id', currentUser.id)
                    .maybeSingle();
                
                const displayName = profile?.full_name || profile?.username || currentUser.email?.split('@')[0] || 'User';
                nameSpan.textContent = displayName;
                emailSpan.textContent = currentUser.email;
                
                if (profile?.avatar_url) {
                    const avatarUrl = buildThumbnailUrl(profile.avatar_url);
                    avatarDiv.innerHTML = `<img src="${avatarUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
                } else {
                    const initial = displayName.charAt(0).toUpperCase();
                    avatarDiv.innerHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--bantu-blue),var(--warm-gold));color:white;font-weight:bold;font-size:1.2rem;">${initial}</div>`;
                }
                
                if (profileSection) {
                    profileSection.onclick = () => {
                        window.location.href = 'profile.html';
                    };
                }
            } catch (error) {
                console.error('Error loading profile:', error);
                const initial = (currentUser.email?.charAt(0) || 'U').toUpperCase();
                avatarDiv.innerHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--bantu-blue),var(--warm-gold));color:white;font-weight:bold;">${initial}</div>`;
                nameSpan.textContent = currentUser.email?.split('@')[0] || 'User';
                emailSpan.textContent = currentUser.email;
            }
        }

        function updateHeaderProfile() {
            const placeholder = document.getElementById('userProfilePlaceholder');
            const nameSpan = document.getElementById('current-profile-name');
            
            if (!currentUser) {
                placeholder.innerHTML = '<i class="fas fa-user"></i>';
                nameSpan.textContent = 'Guest';
                return;
            }
            
            const displayName = currentUser.email?.split('@')[0] || 'User';
            nameSpan.textContent = displayName;
            const initial = displayName.charAt(0).toUpperCase();
            placeholder.innerHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--bantu-blue),var(--warm-gold));color:white;font-weight:bold;font-size:1rem;">${initial}</div>`;
        }

        // ============================================
        // NAVIGATION FUNCTIONS
        // ============================================
        function setupNavigation() {
            document.getElementById('nav-home-btn')?.addEventListener('click', () => {
                window.location.href = 'index.html';
            });
            
            document.getElementById('nav-create-btn')?.addEventListener('click', () => {
                if (currentUser) {
                    window.location.href = 'creator-upload.html';
                } else {
                    showToast('Please sign in to create content', 'warning');
                    window.location.href = 'login.html?redirect=creator-upload.html';
                }
            });
            
            document.getElementById('profile-btn')?.addEventListener('click', () => {
                if (currentUser) {
                    window.location.href = 'profile.html';
                } else {
                    window.location.href = 'login.html?redirect=trending_screen.html';
                }
            });
            
            document.getElementById('explore-all-btn')?.addEventListener('click', () => {
                window.location.href = 'content-library.html?sort=trending';
            });
            
            document.getElementById('view-all-shorts')?.addEventListener('click', () => {
                window.location.href = 'content-library.html?type=shorts';
            });
            
            document.getElementById('search-btn')?.addEventListener('click', () => {
                window.location.href = 'content-library.html';
            });
            
            document.getElementById('voice-search-btn')?.addEventListener('click', () => {
                if ('webkitSpeechRecognition' in window) {
                    const recognition = new webkitSpeechRecognition();
                    recognition.lang = 'en-US';
                    recognition.onresult = (event) => {
                        const query = event.results[0][0].transcript;
                        window.location.href = `content-library.html?search=${encodeURIComponent(query)}`;
                    };
                    recognition.start();
                } else {
                    showToast('Voice search not supported on this browser', 'info');
                }
            });
            
            document.getElementById('notifications-btn')?.addEventListener('click', () => {
                if (!currentUser) {
                    window.location.href = 'login.html?redirect=trending_screen.html';
                    return;
                }
                showToast('Notifications feature coming soon!', 'info');
            });
        }

        // ============================================
        // FETCH CONTENT
        // ============================================
        async function fetchContent(limit = 80) {
            try {
                const { data, error } = await window.supabaseClient
                    .from('Content')
                    .select('*, user_profiles!user_id(*)')
                    .eq('status', 'published')
                    .order('created_at', { ascending: false })
                    .limit(limit);
                
                if (error) {
                    const { data: fallbackData, error: fallbackError } = await window.supabaseClient
                        .from('content')
                        .select('*, user_profiles!user_id(*)')
                        .eq('status', 'published')
                        .order('created_at', { ascending: false })
                        .limit(limit);
                    if (fallbackError) throw fallbackError;
                    return await enrichWithViewCounts(fallbackData || []);
                }
                
                return await enrichWithViewCounts(data || []);
            } catch (error) {
                console.error('Error fetching content:', error);
                showToast('Failed to load content. Please refresh.', 'error');
                return [];
            }
        }

        async function enrichWithViewCounts(contentArray) {
            const enriched = [];
            for (const item of contentArray) {
                const { count } = await window.supabaseClient
                    .from('content_views')
                    .select('*', { count: 'exact', head: true })
                    .eq('content_id', item.id);
                
                enriched.push({
                    ...item,
                    real_views: count || 0,
                    is_new: isContentNew(item.created_at),
                    duration: item.duration || 0,
                    is_live: item.is_live || false
                });
            }
            return enriched;
        }

        // ============================================
        // LOAD CONTINUE WATCHING
        // ============================================
        async function loadContinueWatching() {
            if (!currentUser) return [];
            try {
                const { data, error } = await window.supabaseClient
                    .from('watch_progress')
                    .select('*, Content(*)')
                    .eq('user_id', currentUser.id)
                    .eq('is_completed', false)
                    .order('updated_at', { ascending: false })
                    .limit(1);
                
                if (error) throw error;
                return data || [];
            } catch (error) {
                console.error('Error loading continue watching:', error);
                return [];
            }
        }

        function renderContinueBar(item) {
            if (!item || !item.Content) return '';
            const content = item.Content;
            const percent = Math.min(100, (item.last_position / (content.duration || 1)) * 100);
            return `
                <div class="continue-watching-bar" onclick="window.location.href='content-detail.html?id=${content.id}'">
                    <img class="continue-thumbnail" src="${buildThumbnailUrl(content.thumbnail_url)}" alt="${escapeHtml(content.title)}">
                    <div class="progress-container">
                        <strong>Continue: ${escapeHtml(content.title)}</strong>
                        <div class="progress-track">
                            <div class="progress-fill" style="width: ${percent}%"></div>
                        </div>
                        <span style="font-size:0.8rem; color:var(--slate-grey)">${Math.floor(percent)}% complete</span>
                    </div>
                    <button class="watch-now-btn" style="padding:8px 20px; font-size:0.8rem;" onclick="event.stopPropagation();window.location.href='content-detail.html?id=${content.id}'">RESUME</button>
                </div>
            `;
        }

        // ============================================
        // RENDER FUNCTIONS
        // ============================================
        function renderFilterChips() {
            const container = document.getElementById('filter-container');
            if (!container) return;
            
            container.innerHTML = filters.map(filter => `
                <button class="filter-chip ${filter === selectedFilter ? 'active' : ''}" data-filter="${filter}">${filter.toUpperCase()}</button>
            `).join('');
            
            container.querySelectorAll('.filter-chip').forEach(btn => {
                btn.addEventListener('click', () => {
                    const filter = btn.dataset.filter;
                    if (filter !== 'All') {
                        window.location.href = `content-library.html?genre=${encodeURIComponent(filter)}`;
                    }
                });
            });
        }

        function renderFeatured(content) {
            if (!content) return '';
            const thumbnailUrl = buildThumbnailUrl(content.thumbnail_url);
            const creatorName = content.user_profiles?.username || 'Creator';
            const isVerified = content.user_profiles?.is_verified;
            
            return `
                <div class="featured-trend-card" onclick="window.location.href='content-detail.html?id=${content.id}'">
                    <div class="featured-bg" style="background-image: url('${thumbnailUrl}')"></div>
                    <div class="featured-overlay">
                        ${content.is_live ? '<div class="live-badge">LIVE NOW</div>' : ''}
                        <h2 class="featured-title">${escapeHtml(content.title)}</h2>
                        <div class="featured-creator">
                            @${escapeHtml(creatorName)}
                            ${isVerified ? '<i class="fas fa-check-circle verified-badge"></i>' : ''}
                            <span class="recency-text">• ${formatTimeAgo(content.created_at)}</span>
                        </div>
                        <div class="featured-stats">
                            <span><i class="fas fa-eye"></i> ${formatNumber(content.real_views)} views</span>
                            <span><i class="fas fa-heart"></i> ${formatNumber(content.likes_count || 0)} likes</span>
                        </div>
                        <button class="watch-now-btn">WATCH NOW <i class="fas fa-play"></i></button>
                    </div>
                </div>
            `;
        }

        function renderCards(items, type = 'horizontal') {
            if (!items || !items.length) return '';
            const cardClass = type === 'grid' ? 'gem-card' : 'content-card';
            
            return items.map(item => {
                const thumbnailUrl = buildThumbnailUrl(item.thumbnail_url);
                const creatorName = item.user_profiles?.username || 'Creator';
                const isVerified = item.user_profiles?.is_verified;
                
                return `
                    <div class="${cardClass}" onclick="window.location.href='content-detail.html?id=${item.id}'">
                        <div class="${type === 'grid' ? 'gem-thumbnail' : 'card-thumbnail'}">
                            <img src="${thumbnailUrl}" alt="${escapeHtml(item.title)}" loading="lazy">
                            <div class="duration-badge">${formatDuration(item.duration)}</div>
                            ${item.is_live ? '<div class="badge live">LIVE</div>' : ''}
                            ${item.is_new ? '<div class="badge new">NEW</div>' : ''}
                        </div>
                        <div class="${type === 'grid' ? 'gem-content' : 'card-content'}">
                            <h3 class="card-title">${escapeHtml(item.title)}</h3>
                            <div class="card-creator">
                                @${escapeHtml(creatorName)}
                                ${isVerified ? '<i class="fas fa-check-circle verified-badge"></i>' : ''}
                                <span class="recency-text">• ${formatTimeAgo(item.created_at)}</span>
                            </div>
                            <div class="card-stats">
                                <span><i class="fas fa-eye"></i> ${formatNumber(item.real_views)}</span>
                                <span><i class="fas fa-heart"></i> ${formatNumber(item.likes_count || 0)}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderHashtags() {
            return trendingHashtags.map(tag => `
                <div class="hashtag" data-hashtag="${tag}">${tag}</div>
            `).join('');
        }

        function renderShorts(items) {
            if (!items || !items.length) return '';
            return items.map(item => `
                <div class="shorts-card" onclick="window.location.href='content-detail.html?id=${item.id}'">
                    <div class="shorts-thumbnail">
                        <img src="${buildThumbnailUrl(item.thumbnail_url)}" loading="lazy">
                        <div class="shorts-badge">SHORTS</div>
                        <div class="duration-badge">${formatDuration(item.duration)}</div>
                        <div class="shorts-overlay">
                            <div class="shorts-title">${escapeHtml(item.title)}</div>
                            <div class="shorts-stats"><i class="fas fa-eye"></i> ${formatNumber(item.real_views)} views</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ============================================
        // MAIN LOAD FUNCTION
        // ============================================
        async function loadContent() {
            const loading = document.getElementById('loading');
            const app = document.getElementById('app');
            
            loading.style.display = 'flex';
            
            const contentData = await fetchContent(80);
            allContentData = contentData;
            
            // Process sections
            const featured = [...contentData].sort((a, b) => (b.real_views || 0) - (a.real_views || 0))[0];
            const liveStreams = contentData.filter(c => c.is_live).slice(0, 10);
            const shorts = contentData.filter(c => (c.duration || 0) < 60).slice(0, 15);
            const communityGems = [...contentData]
                .sort((a, b) => ((b.real_views || 0) + (b.likes_count || 0) * 2) - ((a.real_views || 0) + (a.likes_count || 0) * 2))
                .slice(0, 12);
            const personalized = contentData.slice(0, 12);
            
            let html = '';
            
            // Featured Section
            if (featured) {
                html += `
                    <section class="section">
                        <div class="section-header">
                            <h2 class="section-title"><i class="fas fa-rocket section-icon"></i>THE PULSE</h2>
                        </div>
                        ${renderFeatured(featured)}
                    </section>
                `;
            }
            
            // Personalized For You
            if (personalized.length) {
                html += `
                    <section class="section">
                        <div class="section-header">
                            <h2 class="section-title"><i class="fas fa-magic section-icon"></i>MADE FOR YOU</h2>
                            <button class="see-all-btn" onclick="window.location.href='content-library.html?for-you=true'">SEE ALL</button>
                        </div>
                        <div class="content-horizontal-scroll">
                            ${renderCards(personalized)}
                        </div>
                    </section>
                `;
            }
            
            // Live Streams
            if (liveStreams.length) {
                html += `
                    <section class="section">
                        <div class="section-header">
                            <h2 class="section-title"><i class="fas fa-tv section-icon"></i>LIVE NOW</h2>
                            <button class="see-all-btn" onclick="window.location.href='content-library.html?genre=Live'">SEE ALL</button>
                        </div>
                        <div class="content-horizontal-scroll">
                            ${renderCards(liveStreams)}
                        </div>
                    </section>
                `;
            }
            
            // Trending Hashtags
            html += `
                <section class="section">
                    <div class="section-header">
                        <h2 class="section-title"><i class="fas fa-hashtag section-icon"></i>TRENDING TOPICS</h2>
                    </div>
                    <div class="hashtags-container">
                        ${renderHashtags()}
                    </div>
                </section>
            `;
            
            // Community Gems
            if (communityGems.length) {
                html += `
                    <section class="section">
                        <div class="section-header">
                            <h2 class="section-title"><i class="fas fa-gem section-icon"></i>COMMUNITY GEMS</h2>
                            <button class="see-all-btn" onclick="window.location.href='content-library.html?sort=popular'">SEE ALL</button>
                        </div>
                        <div class="community-grid">
                            ${renderCards(communityGems, 'grid')}
                        </div>
                    </section>
                `;
            }
            
            document.getElementById('trending-sections').innerHTML = html;
            
            // Shorts Section
            const shortsContainer = document.getElementById('shorts-scroll');
            const shortsSection = document.getElementById('shorts-section');
            if (shorts.length) {
                shortsContainer.innerHTML = renderShorts(shorts);
                shortsSection.style.display = 'block';
            } else {
                shortsSection.style.display = 'none';
            }
            
            // Hashtag click handlers
            document.querySelectorAll('.hashtag').forEach(tag => {
                tag.addEventListener('click', () => {
                    window.location.href = `content-library.html?search=${encodeURIComponent(tag.dataset.hashtag)}`;
                });
            });
            
            // Continue Watching
            const continueItems = await loadContinueWatching();
            if (continueItems.length) {
                document.getElementById('continue-watching-container').innerHTML = renderContinueBar(continueItems[0]);
                document.getElementById('continue-watching-container').style.display = 'block';
            }
            
            loading.style.display = 'none';
            app.style.display = 'block';
        }

        // ============================================
        // AUTHENTICATION
        // ============================================
        async function checkAuth() {
            const { data: { session } } = await window.supabaseClient.auth.getSession();
            if (session?.user) {
                currentUser = session.user;
                await updateSidebarProfile();
                updateHeaderProfile();
            }
            return !!currentUser;
        }

        // ============================================
        // INITIALIZATION
        // ============================================
        async function init() {
            console.log('🔥 Trending Screen Initializing...');
            
            setupSidebar();
            initThemeSelector();
            setupNavigation();
            renderFilterChips();
            
            await checkAuth();
            await loadContent();
            
            // Auth state listener
            window.supabaseClient.auth.onAuthStateChange(async (event, session) => {
                if (event === 'SIGNED_IN' && session?.user) {
                    currentUser = session.user;
                    await updateSidebarProfile();
                    updateHeaderProfile();
                    await loadContent();
                    showToast('Welcome back!', 'success');
                } else if (event === 'SIGNED_OUT') {
                    currentUser = null;
                    updateSidebarProfile();
                    updateHeaderProfile();
                    await loadContent();
                    showToast('Signed out', 'info');
                }
            });
            
            console.log('✅ Trending Screen Initialized');
        }
        
        // Start initialization
        init();
    </script>
</body>
</html>
