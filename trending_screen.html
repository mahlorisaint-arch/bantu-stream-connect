<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trending Now - Bantu Stream Connect</title>
<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<!-- Supabase JS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* Color Theme */
:root {
  --deep-black: #0A0E12;
  --deep-navy: #0F172A;
  --soft-white: #F8FAFC;
  --slate-grey: #94A3B8;
  --bantu-blue: #1D4ED8;
  --warm-gold: #F59E0B;
  --error-color: #EF4444;
  --success-color: #10B981;
  --purple-accent: #8B5CF6;
  --pink-accent: #EC4899;
}

/* Reset & Base */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #001F54 0%, #0A0E3F 50%, #000000 100%);
  color: var(--soft-white);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ⭐ SKELETON LOADERS */
.skeleton {
  background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
  background-size: 200% 100%;
  animation: skeleton-loading 1.5s infinite;
  border-radius: 8px;
}
.skeleton-text { height: 16px; margin-bottom: 8px; }
.skeleton-title { height: 20px; margin-bottom: 10px; }
.skeleton-thumbnail { height: 180px; border-radius: 15px; }
.skeleton-avatar { width: 40px; height: 40px; border-radius: 50%; }
@keyframes skeleton-loading {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* Loading Screen */
.loading-screen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #001F54 0%, #0A0E3F 50%, #000000 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}
.spinner {
  width: 60px;
  height: 60px;
  border: 4px solid rgba(255, 255, 255, 0.1);
  border-radius: 50%;
  border-top-color: var(--warm-gold);
  animation: spin 1s linear infinite;
  margin-bottom: 20px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Glassmorphism */
.glassmorphism {
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 16px;
}

/* Header */
.header-container {
  position: relative;
  min-height: 30vh;
  overflow: hidden;
}
.header-bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 20% 80%, var(--bantu-blue) 0%, transparent 50%),
              radial-gradient(circle at 80% 20%, #8B5CF6 0%, transparent 50%);
  opacity: 0.3;
}
.grid-pattern {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
  background-size: 30px 30px;
}
.main-header {
  position: relative;
  padding: 20px;
  z-index: 10;
}
.header-content {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  max-width: 1200px;
  margin: 0 auto;
}
.trending-title {
  display: flex;
  align-items: center;
  gap: 15px;
}
.fire-icon {
  font-size: 2.5rem;
  color: var(--warm-gold);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}
.title-text {
  font-family: 'Orbitron', sans-serif;
  font-size: 2.5rem;
  font-weight: 900;
  background: linear-gradient(135deg, var(--soft-white) 0%, var(--warm-gold) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 2px;
}
.header-actions {
  display: flex;
  gap: 10px;
  align-items: center;
}
.icon-btn {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.2);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.3s ease;
  font-size: 1.2rem;
  position: relative;
}
.icon-btn:hover {
  background: rgba(255, 255, 255, 0.2);
  transform: translateY(-2px);
}
.refresh-btn {
  color: var(--bantu-blue);
  animation: rotate 20s linear infinite;
  animation-play-state: paused;
}
.refresh-btn:hover { animation-play-state: running; }
@keyframes rotate { to { transform: rotate(360deg); } }

/* Location Filter */
.location-filter {
  padding: 10px 20px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 25px;
  color: var(--soft-white);
  font-family: 'Inter', sans-serif;
  font-size: 0.9rem;
  cursor: pointer;
  margin-left: 10px;
}
.location-filter:focus {
  outline: none;
  border-color: var(--warm-gold);
}

/* Filter Chips */
.filter-section {
  position: relative;
  padding: 20px;
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  gap: 15px;
  align-items: center;
  flex-wrap: wrap;
}
.filter-container {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding-bottom: 10px;
  scrollbar-width: thin;
  scrollbar-color: var(--bantu-blue) transparent;
  flex: 1;
}
.filter-chip {
  padding: 10px 20px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 25px;
  color: var(--soft-white);
  font-family: 'Inter', sans-serif;
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s ease;
  white-space: nowrap;
}
.filter-chip:hover {
  background: rgba(255, 255, 255, 0.1);
  transform: translateY(-2px);
}
.filter-chip.active {
  background: var(--warm-gold);
  border-color: transparent;
  color: var(--deep-black);
  font-weight: 600;
}
.surprise-me-btn {
  background: linear-gradient(135deg, var(--purple-accent), var(--pink-accent));
  border: none;
  color: white;
  font-weight: 600;
}
.surprise-me-btn:hover {
  box-shadow: 0 5px 20px rgba(236, 72, 153, 0.4);
}

/* Main Content */
.main-content {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
  padding-bottom: 80px;
}
.section { margin-bottom: 40px; }
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}
.section-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--soft-white);
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-icon {
  color: var(--warm-gold);
  font-size: 1.5rem;
}
.see-all-btn {
  padding: 8px 20px;
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 10px;
  color: var(--bantu-blue);
  font-family: 'Orbitron', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
}
.see-all-btn:hover {
  background: rgba(255, 255, 255, 0.2);
  transform: translateX(5px);
}

/* Continue Watching Bar */
.continue-watching-bar {
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 30px;
  display: none;
}
.continue-watching-bar.active {
  display: block;
  animation: slideDown 0.3s ease;
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}
.continue-watching-content {
  display: flex;
  align-items: center;
  gap: 20px;
  flex-wrap: wrap;
}
.continue-thumbnail {
  position: relative;
  width: 160px;
  height: 90px;
  border-radius: 12px;
  overflow: hidden;
  flex-shrink: 0;
}
.continue-thumbnail img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.continue-progress {
  position: absolute;
  bottom: 0;
  left: 0;
  height: 3px;
  background: var(--warm-gold);
  width: 0%;
  transition: width 0.3s ease;
}
.continue-info {
  flex: 1;
  min-width: 200px;
}
.continue-title {
  font-size: 1.2rem;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--soft-white);
}
.continue-meta {
  font-size: 0.9rem;
  color: var(--slate-grey);
  margin-bottom: 15px;
}
.continue-btn {
  padding: 12px 30px;
  background: linear-gradient(135deg, var(--warm-gold) 0%, #f97316 100%);
  border: none;
  border-radius: 12px;
  color: var(--deep-black);
  font-family: 'Inter', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
}
.continue-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(245, 158, 11, 0.4);
}

/* Featured Card */
.featured-trend-card {
  position: relative;
  border-radius: 20px;
  overflow: hidden;
  height: 400px;
  margin-bottom: 30px;
}
.featured-bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  transition: transform 0.5s ease;
}
.featured-trend-card:hover .featured-bg { transform: scale(1.05); }
.featured-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(to bottom, transparent 0%, rgba(0, 0, 0, 0.8) 100%);
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 30px;
}
.live-badge {
  display: inline-block;
  padding: 8px 20px;
  background: rgba(239, 68, 68, 0.9);
  border-radius: 20px;
  color: white;
  font-weight: 700;
  font-size: 0.9rem;
  margin-bottom: 20px;
  align-self: flex-start;
}
.featured-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 2.5rem;
  font-weight: 800;
  color: white;
  margin-bottom: 10px;
  line-height: 1.2;
}
.featured-creator {
  font-size: 1.2rem;
  color: var(--warm-gold);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.verified-badge {
  color: var(--bantu-blue);
  font-size: 1rem;
}
.featured-stats {
  display: flex;
  gap: 20px;
  margin-bottom: 25px;
  color: rgba(255, 255, 255, 0.8);
}
.recency-text {
  font-size: 0.85rem;
  color: var(--slate-grey);
  margin-left: 10px;
}
.watch-now-btn {
  padding: 15px 40px;
  background: linear-gradient(135deg, var(--warm-gold) 0%, #f97316 100%);
  border: none;
  border-radius: 12px;
  color: var(--deep-black);
  font-family: 'Inter', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
  align-self: flex-start;
}
.watch-now-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 25px rgba(245, 158, 11, 0.4);
}

/* Content Cards */
.content-horizontal-scroll {
  display: flex;
  gap: 20px;
  overflow-x: auto;
  padding-bottom: 20px;
  scrollbar-width: thin;
  scrollbar-color: var(--bantu-blue) transparent;
}
.content-card {
  flex: 0 0 300px;
  border-radius: 15px;
  overflow: hidden;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  transition: all 0.3s ease;
  cursor: pointer;
  position: relative;
}
.content-card:hover {
  transform: translateY(-10px);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
}
.card-thumbnail {
  position: relative;
  height: 180px;
  overflow: hidden;
  background: linear-gradient(135deg, #1D4ED8, #8B5CF6);
}
.card-thumbnail img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.3s ease;
}
.content-card:hover .card-thumbnail img { transform: scale(1.1); }
.thumbnail-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(to bottom, transparent 0%, rgba(0, 0, 0, 0.5) 100%);
}
.card-badges {
  position: absolute;
  top: 15px;
  left: 15px;
  display: flex;
  gap: 10px;
}
.duration-badge {
  position: absolute;
  bottom: 10px;
  right: 10px;
  padding: 4px 10px;
  background: rgba(0, 0, 0, 0.85);
  border-radius: 6px;
  color: white;
  font-size: 0.75rem;
  font-weight: 600;
  z-index: 2;
}
.badge {
  padding: 5px 12px;
  border-radius: 15px;
  font-size: 0.8rem;
  font-weight: 600;
}
.badge.live { background: rgba(239, 68, 68, 0.9); color: white; }
.badge.upcoming { background: rgba(29, 78, 216, 0.9); color: white; }
.badge.viewers { background: rgba(0, 0, 0, 0.7); color: white; }
.badge.new { background: rgba(16, 185, 129, 0.9); color: white; }
.card-content { padding: 20px; }
.card-title {
  font-size: 1.1rem;
  font-weight: 600;
  margin-bottom: 10px;
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-creator {
  font-size: 0.9rem;
  color: var(--slate-grey);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.card-stats {
  display: flex;
  gap: 15px;
  font-size: 0.8rem;
  color: rgba(255, 255, 255, 0.6);
  align-items: center;
}
.recommendation-reason {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 8px;
  font-size: 0.75rem;
  color: var(--warm-gold);
}
.card-actions {
  position: absolute;
  top: 10px;
  right: 10px;
  z-index: 10;
}
.action-menu-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(0, 0, 0, 0.7);
  border: none;
  color: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
  opacity: 0;
}
.content-card:hover .action-menu-btn {
  opacity: 1;
}
.action-menu-btn:hover {
  background: rgba(255, 255, 255, 0.2);
}
.action-menu-dropdown {
  position: absolute;
  top: 40px;
  right: 0;
  background: rgba(15, 23, 42, 0.95);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 12px;
  padding: 8px 0;
  min-width: 180px;
  display: none;
  z-index: 100;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
}
.action-menu-dropdown.active {
  display: block;
}
.action-menu-item {
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--soft-white);
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.2s ease;
}
.action-menu-item:hover {
  background: rgba(255, 255, 255, 0.1);
}
.action-menu-item i {
  width: 20px;
  text-align: center;
  color: var(--warm-gold);
}
.reminder-btn {
  width: 100%;
  padding: 10px;
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 8px;
  color: white;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  margin-top: 10px;
}
.reminder-btn:hover { background: rgba(255, 255, 255, 0.2); }

/* Hashtags */
.hashtags-container {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 15px;
}
.hashtag {
  padding: 10px 20px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 20px;
  color: var(--warm-gold);
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.3s ease;
}
.hashtag:hover {
  background: rgba(245, 158, 11, 0.1);
  transform: translateY(-2px);
}

/* Community Gems */
.community-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}
.gem-card {
  border-radius: 15px;
  overflow: hidden;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  transition: all 0.3s ease;
  cursor: pointer;
  position: relative;
}
.gem-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
}
.gem-thumbnail {
  height: 160px;
  overflow: hidden;
  background: linear-gradient(135deg, #1D4ED8, #8B5CF6);
  position: relative;
}
.gem-thumbnail img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.3s ease;
}
.gem-card:hover .gem-thumbnail img { transform: scale(1.1); }
.gem-content { padding: 15px; }

/* User Streak Display */
.user-streak-display {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(245, 158, 11, 0.15);
  padding: 8px 15px;
  border-radius: 20px;
  font-size: 0.85rem;
  margin-right: 10px;
}
.user-streak-display i {
  color: var(--warm-gold);
  animation: pulse 2s infinite;
}

/* Shorts Section */
.shorts-section {
  margin-bottom: 40px;
}
.shorts-scroll {
  display: flex;
  gap: 15px;
  overflow-x: auto;
  padding-bottom: 20px;
  scrollbar-width: thin;
  scrollbar-color: var(--bantu-blue) transparent;
}
.shorts-card {
  flex: 0 0 180px;
  border-radius: 15px;
  overflow: hidden;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  transition: all 0.3s ease;
  cursor: pointer;
  position: relative;
}
.shorts-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
}
.shorts-thumbnail {
  height: 320px;
  overflow: hidden;
  background: linear-gradient(135deg, #1D4ED8, #8B5CF6);
  position: relative;
}
.shorts-thumbnail img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.3s ease;
}
.shorts-card:hover .shorts-thumbnail img { transform: scale(1.1); }
.shorts-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  padding: 15px;
  background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
}
.shorts-title {
  font-size: 0.9rem;
  font-weight: 600;
  margin-bottom: 5px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.shorts-stats {
  font-size: 0.75rem;
  color: rgba(255, 255, 255, 0.7);
}
.shorts-badge {
  position: absolute;
  top: 10px;
  left: 10px;
  padding: 5px 12px;
  background: rgba(239, 68, 68, 0.9);
  border-radius: 8px;
  color: white;
  font-size: 0.7rem;
  font-weight: 700;
}

/* Explore All */
.explore-all-section {
  text-align: center;
  padding: 40px 20px;
}
.explore-btn {
  padding: 20px 50px;
  background: linear-gradient(135deg, var(--bantu-blue) 0%, #3730a3 100%);
  border: none;
  border-radius: 15px;
  color: white;
  font-family: 'Orbitron', sans-serif;
  font-size: 1.2rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
  display: inline-flex;
  align-items: center;
  gap: 15px;
}
.explore-btn:hover {
  transform: translateY(-5px);
  box-shadow: 0 15px 30px rgba(29, 78, 216, 0.4);
}

/* Infinite Scroll Loader */
.infinite-scroll-loader {
  text-align: center;
  padding: 40px 20px;
  display: none;
}
.infinite-scroll-loader.active {
  display: block;
}
.infinite-spinner {
  width: 40px;
  height: 40px;
  border: 3px solid rgba(255, 255, 255, 0.1);
  border-radius: 50%;
  border-top-color: var(--warm-gold);
  animation: spin 1s linear infinite;
  margin: 0 auto 15px;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: 15px 25px;
  border-radius: 10px;
  color: white;
  font-weight: 500;
  z-index: 1000;
  animation: slideIn 0.3s ease;
  max-width: 300px;
}
.toast.success { background: linear-gradient(135deg, #51cf66 0%, #2b8a3e 100%); }
.toast.info { background: linear-gradient(135deg, #4dabf7 0%, #748ffc 100%); }
.toast.error { background: linear-gradient(135deg, #ff6b6b 0%, #c92a2a 100%); }
@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

  position: fixed;

  left: 0;

  backdrop-filter: blur(10px);

  justify-content: space-around;
  padding: 15px 0;

}
.nav-item {

}

.nav-item.active { color: var(--warm-gold); }

    if (hrs > 0) {

  function buildThumbnailUrl(thumbnailPath) {
    var fallbackImages = [
      'https://images.unsplash.com/photo-1611162617474-5b21e879e113?w=800&h=450&fit=crop',
      'https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?w=800&h=450&fit=crop',
      'https://images.unsplash.com/photo-1585829365295-ab7cd400c167?w=800&h=450&fit=crop',
      'https://images.unsplash.com/photo-1492684223066-81342ee5ff30?w=800&h=450&fit=crop'
    ];
    if (!thumbnailPath || thumbnailPath.trim() === '') {
      return fallbackImages[0];
    }
    if (thumbnailPath.startsWith('http')) {
      return thumbnailPath;
    }
    var cleanPath = thumbnailPath.replace(/^\/+/, '');
    return 'https://ydnxqnbjoshvxteevemc.supabase.co/storage/v1/object/public/' + cleanPath;
  }
  
  function escapeHtml(text) {
    if (!text) return '';
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }
  
  function formatNotificationTime(timestamp) {
    if (!timestamp) return 'Just now';
    var diffMs = Date.now() - new Date(timestamp).getTime();
    var diffMins = Math.floor(diffMs / 60000);
    var diffHours = Math.floor(diffMs / 3600000);
    var diffDays = Math.floor(diffMs / 86400000);
    if (diffMins < 1) return 'Just now';
    if (diffMins < 60) return diffMins + 'm ago';
    if (diffHours < 24) return diffHours + 'h ago';
    if (diffDays < 7) return diffDays + 'd ago';
    return new Date(timestamp).toLocaleDateString();
  }

  function processTrendingSections(contentData) {
    allContentData = contentData;
    
    // Featured: highest views
    featuredTrend = contentData.slice().sort(function(a, b) {
      return (b.views_count || 0) - (a.views_count || 0);
    }).slice(0, 1);
    
    // Live streams
    liveStreams = contentData.filter(function(item) { 
      return item.is_live === true; 
    }).slice(0, 10);
    
    // Shorts: duration < 60 seconds
    shortsContent = contentData.filter(function(item) {
      return (item.duration || 999) < 60 && !item.is_live;
    }).slice(0, 15);
    
    // Community gems: engagement score
    communityGems = contentData.slice().sort(function(a, b) {
      var aScore = (a.views_count || 0) + ((a.likes_count || 0) * 2) + ((a.comments_count || 0) * 3);
      var bScore = (b.views_count || 0) + ((b.likes_count || 0) * 2) + ((b.comments_count || 0) * 3);
      return bScore - aScore;
    }).slice(0, 20);
    
    trendingHashtags = ['#OwnYourStage', '#BantuFuture', '#1MinComedy', '#SofaTalks', '#JoburgVibes', '#AfricanTalent', '#StreamConnect', '#RisingStars'];

  // ✅ LOAD CONTINUE WATCHING
  function loadContinueWatching() {
    if (!currentUser) {
      if (continueWatchingBar) continueWatchingBar.classList.remove('active');
      return Promise.resolve();
    }
    
    return window.supabaseClient
      .from('watch_progress')
      .select(`
        *,
        "Content"!inner (
          id,
          title,
          thumbnail_url,
          duration
        )
      `)
      .eq('user_id', currentUser.id)
      .eq('is_completed', false)
      .order('updated_at', { ascending: false })
      .limit(1)
      .then(function(response) {
        var progress = response.data;
        if (progress && progress.length > 0) {
          var item = progress[0];
          var content = item.Content;
          var progressPercent = content.duration > 0 
            ? Math.round((item.last_position / content.duration) * 100) 
            : 0;
          var timeRemaining = content.duration > 0 
            ? formatDuration(content.duration - item.last_position)
            : 'Unknown';
          
          if (continueThumbnailImg) continueThumbnailImg.src = buildThumbnailUrl(content.thumbnail_url);
          if (continueTitleText) continueTitleText.textContent = content.title;
          if (continueMetaText) continueMetaText.textContent = 
            progressPercent + '% complete • ' + timeRemaining + ' remaining';
          if (continueProgressBar) continueProgressBar.style.width = progressPercent + '%';
          if (continueWatchBtn) {
            continueWatchBtn.onclick = function() {
              playContent(content.id);
            };
          }
          
          if (continueWatchingBar) continueWatchingBar.classList.add('active');
        } else {
          if (continueWatchingBar) continueWatchingBar.classList.remove('active');
        }
      })
      .catch(function(error) {
        console.log('No continue watching data:', error);
      });
  }

  function updateNotificationBadge(count) {
    var badge = document.getElementById('notification-count');
    if (badge) {
      badge.textContent = count > 99 ? '99+' : count;
      badge.style.display = count > 0 ? 'flex' : 'none';
    }
  }
  
  function getNotificationIcon(type) {
    switch(type) {
      case 'like': return 'fas fa-heart';
      case 'comment': return 'fas fa-comment';
      case 'follow': return 'fas fa-user-plus';
      case 'view_milestone': return 'fas fa-trophy';
      case 'system': return 'fas fa-bell';
      default: return 'fas fa-bell';
    }
  }
  
  function renderNotifications() {
    if (!notificationsList) return;
    if (!currentUser) {
      notificationsList.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--slate-grey)"><i class="fas fa-bell-slash" style="font-size:48px;margin-bottom:15px;opacity:0.5"></i><p>Sign in to see notifications</p></div>';
      return;
    }
    if (!notifications || notifications.length === 0) {
      notificationsList.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--slate-grey)"><i class="fas fa-bell" style="font-size:48px;margin-bottom:15px;opacity:0.3"></i><p>No notifications yet</p></div>';
      return;
    }
    var html = notifications.map(function(notification) {
      return '<div class="notification-item ' + (notification.is_read ? 'read' : 'unread') + '" data-id="' + notification.id + '">' +
        '<div class="notification-icon"><i class="' + getNotificationIcon(notification.type) + '" style="color:white"></i></div>' +
        '<div class="notification-content">' +
        '<h4>' + escapeHtml(notification.title) + '</h4>' +
        '<p>' + escapeHtml(notification.message) + '</p>' +
        '<span class="notification-time">' + formatNotificationTime(notification.created_at) + '</span>' +
        '</div>' +
        (!notification.is_read ? '<div class="notification-dot"></div>' : '') +
        '</div>';
    }).join('');
    notificationsList.innerHTML = html;
    var items = notificationsList.querySelectorAll('.notification-item');
    items.forEach(function(item) {
      item.addEventListener('click', function() {
        var id = item.dataset.id;
        markNotificationAsRead(id);
      });
    });
  }
  
  function markNotificationAsRead(notificationId) {
    return window.supabaseClient
      .from('notifications')
      .update({ is_read: true })
      .eq('id', notificationId)
      .then(function() {
        loadNotifications();
      })
      .catch(function(error) {
        console.error('Error marking notification as read:', error);
      });
  }
  
  function markAllNotificationsAsRead() {
    if (!currentUser) return Promise.resolve();
    return window.supabaseClient
      .from('notifications')
      .update({ is_read: true })
      .eq('user_id', currentUser.id)
      .eq('is_read', false)
      .then(function() {
        loadNotifications();
        showToast('All notifications marked as read', 'success');
      })
      .catch(function(error) {
        console.error('Error marking all as read:', error);
      });
  }
  
  // ✅ SEARCH FUNCTIONALITY
  function setupSearch() {
    if (!searchInput) return;
    
    searchInput.addEventListener('input', function(e) {
      var query = e.target.value.trim();
      clearTimeout(searchDebounceTimer);
      if (query.length < 2) {
        if (searchSuggestions) searchSuggestions.classList.remove('active');
        return;
      }
      searchDebounceTimer = setTimeout(function() {
        performSearch(query);
      }, 300);
    });
  }
  
  function performSearch(query) {
    if (!searchSuggestions) return;
    var suggestions = allContentData.filter(function(item) {
      return item.title && item.title.toLowerCase().includes(query.toLowerCase());
    }).slice(0, 5);
    
    if (suggestions.length === 0) {
      searchSuggestions.classList.remove('active');
      searchSuggestions.innerHTML = '';
      return;
    }
    
    var html = suggestions.map(function(item) {
      return '<div class="suggestion-item" data-content-id="' + item.id + '">' +
        '<i class="fas fa-search"></i>' +
        '<span>' + escapeHtml(item.title) + '</span>' +
        '</div>';
    }).join('');
    searchSuggestions.innerHTML = html;
    searchSuggestions.classList.add('active');
    
    searchSuggestions.querySelectorAll('.suggestion-item').forEach(function(item) {
      item.addEventListener('click', function() {
        var contentId = item.dataset.contentId;
        var modal = document.getElementById('search-modal');
        if (modal) modal.classList.remove('active');
        playContent(contentId);
      });
    });
  }
  
  // ✅ SETUP EVENT LISTENERS
  function setupEventListeners() {
    if (refreshBtn) {
      refreshBtn.addEventListener('click', function() {
        loadContent();
        showToast('Content refreshed', 'success');
      });
    }
    
    if (exploreAllBtn) {
      exploreAllBtn.addEventListener('click', function() {
        window.location.href = 'content-library.html?sort=trending';
      });
    }
    
    if (authLoginBtn) {
      authLoginBtn.addEventListener('click', function() {
        window.location.href = 'login.html?redirect=trending_screen.html';
      });
    }
    
    if (authCancelBtn) {
      authCancelBtn.addEventListener('click', function() {
        if (authModal) authModal.classList.remove('active');
      });
    }
    
    if (searchBtn) {
      searchBtn.addEventListener('click', function() {
        var modal = document.getElementById('search-modal');
        if (modal) modal.classList.add('active');
        setTimeout(function() {
          if (searchInput) searchInput.focus();
        }, 300);
      });
    }
    
    if (closeSearchBtn) {
      closeSearchBtn.addEventListener('click', function() {
        var modal = document.getElementById('search-modal');
        if (modal) modal.classList.remove('active');
        if (searchInput) searchInput.value = '';
        if (searchResultsGrid) searchResultsGrid.innerHTML = '';
        if (searchSuggestions) {
          searchSuggestions.classList.remove('active');
          searchSuggestions.innerHTML = '';
        }
      });
    }
    
    if (profileBtn) {
      profileBtn.addEventListener('click', function() {
        window.location.href = currentUser ? 'profile.html' : 'login.html';
      });
    }
    
    if (notificationsBtn) {
      notificationsBtn.addEventListener('click', function() {
        var panel = document.getElementById('notifications-panel');
        if (panel) panel.classList.add('active');
        renderNotifications();
      });
    }
    
    if (closeNotificationsBtn) {
      closeNotificationsBtn.addEventListener('click', function() {
        var panel = document.getElementById('notifications-panel');
        if (panel) panel.classList.remove('active');
      });
    }
    
    if (markAllReadBtn) {
      markAllReadBtn.addEventListener('click', markAllNotificationsAsRead);
    }
    
    if (surpriseMeBtn) {
      surpriseMeBtn.addEventListener('click', function() {
        showToast('🎲 Surprise content coming soon!', 'info');
      });
    }
    
    if (locationFilter) {
      locationFilter.addEventListener('change', function() {
        currentGenre = this.value !== 'global' ? this.value : null;
        loadContent();
        showToast('Filtering by: ' + this.options[this.selectedIndex].text, 'info');
      });
    }
    
    var searchModal = document.getElementById('search-modal');
    if (searchModal) {
      searchModal.addEventListener('click', function(e) {
        if (e.target === searchModal) {
          searchModal.classList.remove('active');
          if (searchInput) searchInput.value = '';
          if (searchResultsGrid) searchResultsGrid.innerHTML = '';
          if (searchSuggestions) {
            searchSuggestions.classList.remove('active');
            searchSuggestions.innerHTML = '';
          }
        }
      });
    }
    
    var notifPanel = document.getElementById('notifications-panel');
    if (notifPanel) {
      notifPanel.addEventListener('click', function(e) {
        if (e.target === notifPanel) {
          notifPanel.classList.remove('active');
        }
      });
    }
  }
  
  // ✅ CHECK AUTHENTICATION
  async function checkAuthentication() {
    setLoading(true, 'Checking authentication...');
    var sessionResponse = await window.supabaseClient.auth.getSession();
    var session = sessionResponse.data.session;
    var error = sessionResponse.error;
    
    if (error || !session || !session.user) {
      console.log('⚠️ User not authenticated');
      showToast('Please sign in to access trending content', 'error');
      if (authModal) authModal.classList.add('active');
      setLoading(false);
      return false;
    }
    
    currentUser = session.user;
    console.log('✅ User authenticated:', currentUser.email);
    await loadUserProfilePicture(currentUser);
    await loadNotifications();
    await loadUserStreak();
    await loadContinueWatching();
    return true;
  }
  
  // ✅ SIMPLIFIED INITIALIZE
  async function initializeTrendingScreen() {
    console.log('🔥 Initializing Trending Screen...');
    
    // Close any open modals
    var searchModal = document.getElementById('search-modal');
    var notificationsPanel = document.getElementById('notifications-panel');
    var authModalEl = document.getElementById('auth-modal');
    if (searchModal) searchModal.classList.remove('active');
    if (notificationsPanel) notificationsPanel.classList.remove('active');
    if (authModalEl) authModalEl.classList.remove('active');
    
    var isAuthenticated = await checkAuthentication();
    if (!isAuthenticated) {
      setLoading(false);
      return;
    }
    
    setupEventListeners();
    setupSearch();
    
    // ✅ Just load content directly - no personalization RPC for now
    await loadContent();
    
    console.log('✅ Trending Screen initialized');
  }
  
  // Global functions for HTML onclick
  window.viewAllTrending = function() {
    window.location.href = 'content-library.html?sort=trending';
  };
  window.viewAllLiveStreams = function() {
    window.location.href = 'content-library.html?genre=Live';
  };
  window.viewAllCommunityGems = function() {
    window.location.href = 'content-library.html?sort=popular';
  };
  window.viewAllShorts = function() {
    window.location.href = 'content-library.html?type=shorts';
  };
  window.playContent = playContent;
  window.toggleActionMenu = function(event, contentId) {
    event.stopPropagation();
    var dropdown = document.getElementById('action-menu-' + contentId);
    var allDropdowns = document.querySelectorAll('.action-menu-dropdown');
    allDropdowns.forEach(function(d) {
      if (d.id !== 'action-menu-' + contentId) {
        d.classList.remove('active');
      }
    });
    if (dropdown) {
      dropdown.classList.toggle('active');
    }
  };
  window.saveToWatchLater = function(contentId) {
    showToast('Saved to Watch Later', 'success');
    closeAllActionMenus();
  };
  window.shareContent = function(contentId) {
    var url = window.location.origin + '/content-detail.html?id=' + contentId;
    if (navigator.share) {
      navigator.share({
        title: 'Check out this content on Bantu Stream Connect',
        url: url
      });
    } else {
      navigator.clipboard.writeText(url);
      showToast('Link copied to clipboard', 'success');
    }
    closeAllActionMenus();
  };
  window.notInterested = function(contentId) {
    showToast('We\'ll show less of this', 'info');
    closeAllActionMenus();
  };
  
  function closeAllActionMenus() {
    var allDropdowns = document.querySelectorAll('.action-menu-dropdown');
    allDropdowns.forEach(function(d) {
      d.classList.remove('active');
    });
  }
  
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.card-actions')) {
      closeAllActionMenus();
    }
  });
  
  // Auth state change listener
  window.supabaseClient.auth.onAuthStateChange(function(event, session) {
    console.log('Auth state changed:', event);
    if (event === 'SIGNED_IN' && session && session.user) {
      currentUser = session.user;
      loadUserProfilePicture(currentUser);
      loadNotifications();
      loadUserStreak();
      loadContinueWatching();
      showToast('Welcome back!', 'success');
      loadContent();
    } else if (event === 'SIGNED_OUT') {
      currentUser = null;
      var placeholder = document.getElementById('userProfilePlaceholder');
      if (placeholder) {
        placeholder.innerHTML = '<div class="profile-placeholder"><i class="fas fa-user"></i></div>';
      }
      updateNotificationBadge(0);
      notifications = [];
      renderNotifications();
      if (userStreakDisplay) userStreakDisplay.style.display = 'none';
      if (continueWatchingBar) continueWatchingBar.classList.remove('active');
      showToast('Signed out successfully', 'info');
      if (authModal) authModal.classList.add('active');
    }
  });
  
  // Start initialization
  initializeTrendingScreen();
});
</script>
</body>
</html>
