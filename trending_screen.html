<style>
/* Color Theme */
:root {
  --deep-black: #0A0E12;
  --deep-navy: #0F172A;
  --soft-white: #F8FAFC;
  --slate-grey: #94A3B8;
  --bantu-blue: #1D4ED8;
  --warm-gold: #F59E0B;
  --error-color: #EF4444;
  --success-color: #10B981;
  --purple-accent: #8B5CF6;
  --pink-accent: #EC4899;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #001F54 0%, #0A0E3F 50%, #000000 100%);
  color: var(--soft-white);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Loading Screen */
.loading-screen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #001F54 0%, #0A0E3F 50%, #000000 100%);

  z-index: 9999;
}

  border: 4px solid rgba(255, 255, 255, 0.1);
  border-radius: 50%;

  animation: spin 1s linear infinite;
  margin-bottom: 20px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Header */
.header-container {
  position: relative;
  min-height: 30vh;
  overflow: hidden;
}
.header-bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 20% 80%, var(--bantu-blue) 0%, transparent 50%),
              radial-gradient(circle at 80% 20%, #8B5CF6 0%, transparent 50%);

}
.grid-pattern {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),

}
.main-header {

  padding: 20px;
  z-index: 10;
}
.header-content {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  max-width: 1200px;
  margin: 0 auto;
  flex-wrap: wrap;
  gap: 15px;
}
.trending-title {
  display: flex;
  align-items: center;
  gap: 15px;
}
.fire-icon {
  font-size: 2.5rem;

}

.title-text {

}
.header-actions {

  flex-wrap: wrap;
}

.badge {

}
.badge.live { background: rgba(239, 68, 68, 0.9); color: white; }

.card-content { padding: 20px; }
.card-title {

}
.card-actions {

}

  function renderLiveStreams() { return liveStreams.map(function(content) { var thumbnailUrl = buildThumbnailUrl(content.thumbnail_url); var creatorName = content.creator_username; var isVerified = content.is_verified; var verifiedBadge = isVerified ? '<i class="fas fa-check-circle verified-badge"></i>' : ''; var fallbackImg = 'https://images.unsplash.com/photo-1611162617474-5b21e879e113?w=800&h=450&fit=crop'; var duration = content.duration ? formatDuration(content.duration) : 'LIVE'; return '<div class="content-card" data-content-id="' + content.id + '"><div class="card-thumbnail"><img src="' + thumbnailUrl + '" alt="' + escapeHtml(content.title) + '" loading="lazy" onerror="this.src=\'' + fallbackImg + '\'"><div class="thumbnail-overlay"></div><div class="card-badges"><div class="badge live">LIVE</div><div class="badge viewers"><i class="fas fa-eye"></i> ' + formatNumber(content.views_count || 0) + '</div></div><div class="duration-badge">' + duration + '</div><div class="card-actions"><button class="action-menu-btn" onclick="toggleActionMenu(event, \'' + content.id + '\')"><i class="fas fa-ellipsis-vertical"></i></button><div class="action-menu-dropdown" id="action-menu-' + content.id + '"><div class="action-menu-item" onclick="saveToWatchLater(\'' + content.id + '\')"><i class="fas fa-clock"></i> Save to Watch Later</div><div class="action-menu-item" onclick="shareContent(\'' + content.id + '\')"><i class="fas fa-share"></i> Share</div><div class="action-menu-item" onclick="notInterested(\'' + content.id + '\')"><i class="fas fa-thumbs-down"></i> Not Interested</div></div></div></div><div class="card-content"><h3 class="card-title">' + escapeHtml(content.title) + '</h3><div class="card-creator">@' + escapeHtml(creatorName) + verifiedBadge + ' <span class="recency-text">• ' + formatTimeAgo(content.created_at) + '</span></div><div class="card-stats"><span><i class="fas fa-heart"></i> ' + formatNumber(content.likes_count || 0) + '</span><span><i class="fas fa-comment"></i> ' + formatNumber(content.comments_count || 0) + '</span></div>' + renderRecommendationReason(content.recommendation_reason) + '</div></div>'; }).join(''); }
  
  function renderCommunityGems() { return communityGems.map(function(content) { var thumbnailUrl = buildThumbnailUrl(content.thumbnail_url); var creatorName = content.creator_username; var isVerified = content.is_verified; var verifiedBadge = isVerified ? '<i class="fas fa-check-circle verified-badge"></i>' : ''; var fallbackImg = 'https://images.unsplash.com/photo-1611162617474-5b21e879e113?w=800&h=450&fit=crop'; var duration = content.duration ? formatDuration(content.duration) : ''; return '<div class="gem-card" data-content-id="' + content.id + '"><div class="gem-thumbnail"><img src="' + thumbnailUrl + '" alt="' + escapeHtml(content.title) + '" loading="lazy" onerror="this.src=\'' + fallbackImg + '\">' + (duration ? '<div class="duration-badge">' + duration + '</div>' : '') + '<div class="card-actions"><button class="action-menu-btn" onclick="toggleActionMenu(event, \'' + content.id + '\')"><i class="fas fa-ellipsis-vertical"></i></button><div class="action-menu-dropdown" id="action-menu-' + content.id + '"><div class="action-menu-item" onclick="saveToWatchLater(\'' + content.id + '\')"><i class="fas fa-clock"></i> Save to Watch Later</div><div class="action-menu-item" onclick="shareContent(\'' + content.id + '\')"><i class="fas fa-share"></i> Share</div></div></div></div><div class="gem-content"><h3 class="card-title">' + escapeHtml(content.title) + '</h3><div class="card-creator">@' + escapeHtml(creatorName) + verifiedBadge + ' <span class="recency-text">• ' + formatTimeAgo(content.created_at) + '</span></div><div class="card-stats"><span><i class="fas fa-eye"></i> ' + formatNumber(content.views_count || 0) + '</span><span><i class="fas fa-heart"></i> ' + formatNumber(content.likes_count || 0) + '</span></div>' + renderRecommendationReason(content.recommendation_reason) + '</div></div>'; }).join(''); }
  
  function renderShorts() { return shortsContent.map(function(content) { var thumbnailUrl = buildThumbnailUrl(content.thumbnail_url); var fallbackImg = 'https://images.unsplash.com/photo-1611162617474-5b21e879e113?w=800&h=450&fit=crop'; var duration = content.duration ? formatDuration(content.duration) : '0:59'; return '<div class="shorts-card" data-content-id="' + content.id + '"><div class="shorts-thumbnail"><img src="' + thumbnailUrl + '" alt="' + escapeHtml(content.title) + '" loading="lazy" onerror="this.src=\'' + fallbackImg + '\'"><div class="shorts-badge">SHORTS</div><div class="duration-badge">' + duration + '</div><div class="shorts-overlay"><div class="shorts-title">' + escapeHtml(content.title) + '</div><div class="shorts-stats"><i class="fas fa-eye"></i> ' + formatNumber(content.views_count || 0) + ' views</div></div></div></div>'; }).join(''); }
  
  function renderTrendingHashtags() { return trendingHashtags.map(function(hashtag) { return '<div class="hashtag" data-hashtag="' + hashtag + '">' + hashtag + '</div>'; }).join(''); }
  
  function renderFilterChips() { if (!filterContainer) return; var html = filters.map(function(filter) { return '<button class="filter-chip ' + (filter === selectedFilter ? 'active' : '') + '" data-filter="' + filter + '">' + filter.toUpperCase() + '</button>'; }).join(''); filterContainer.innerHTML = html; document.querySelectorAll('.filter-chip').forEach(function(button) { button.addEventListener('click', function() { var filter = button.dataset.filter; selectedFilter = filter; document.querySelectorAll('.filter-chip').forEach(function(btn) { btn.classList.toggle('active', btn.dataset.filter === filter); }); if (filter !== 'All') { window.location.href = 'content-library.html?genre=' + encodeURIComponent(filter); } else { loadContent(); } }); }); }
  
  function renderTrendingSections() { if (!trendingSections) return; var html = ''; if (featuredTrend.length > 0) { html += '<section class="section"><div class="section-header"><h2 class="section-title"><i class="fas fa-rocket section-icon"></i>THE PULSE</h2><button class="see-all-btn" onclick="viewAllTrending()">SEE ALL</button></div>' + renderFeaturedTrend() + '</section>'; } if (liveStreams.length > 0) { html += '<section class="section"><div class="section-header"><h2 class="section-title"><i class="fas fa-tv section-icon"></i>LIVE STREAMS</h2><button class="see-all-btn" onclick="viewAllLiveStreams()">SEE ALL</button></div><div class="content-horizontal-scroll">' + renderLiveStreams() + '</div></section>'; } if (trendingHashtags.length > 0) { html += '<section class="section"><div class="section-header"><h2 class="section-title"><i class="fas fa-fire section-icon"></i>TRENDING TOPICS</h2></div><div class="hashtags-container">' + renderTrendingHashtags() + '</div></section>'; } if (communityGems.length > 0) { html += '<section class="section"><div class="section-header"><h2 class="section-title"><i class="fas fa-gem section-icon"></i>COMMUNITY GEMS</h2><button class="see-all-btn" onclick="viewAllCommunityGems()">SEE ALL</button></div><div class="community-grid">' + renderCommunityGems() + '</div></section>'; } trendingSections.innerHTML = html; if (shortsContent.length > 0) { shortsScroll.innerHTML = renderShorts(); shortsSection.style.display = 'block'; } else { shortsSection.style.display = 'none'; } document.querySelectorAll('[data-content-id]').forEach(function(card) { card.addEventListener('click', function(e) { if (e.target.closest('button') || e.target.closest('.action-menu-btn')) return; playContent(card.dataset.contentId); }); }); document.querySelectorAll('[data-hashtag]').forEach(function(hashtag) { hashtag.addEventListener('click', function() { window.location.href = 'content-library.html?search=' + encodeURIComponent(hashtag.dataset.hashtag); }); }); }
  
  function playContent(contentId) { if (!contentId) return; var viewerId = currentUser ? currentUser.id : null; window.supabaseClient.from('content_views').insert({ content_id: contentId, viewer_id: viewerId, view_duration: 0, device_type: /Mobile|Android|iPhone/i.test(navigator.userAgent) ? 'mobile' : 'desktop', created_at: new Date().toISOString() }).then(function() { window.location.href = 'content-detail.html?id=' + contentId; }).catch(function() { window.location.href = 'content-detail.html?id=' + contentId; }); }
  
  window.toggleActionMenu = function(event, contentId) { event.stopPropagation(); var dropdown = document.getElementById('action-menu-' + contentId); document.querySelectorAll('.action-menu-dropdown').forEach(function(d) { if (d.id !== 'action-menu-' + contentId) d.classList.remove('active'); }); if (dropdown) dropdown.classList.toggle('active'); };
  window.saveToWatchLater = function(contentId) { showToast('Saved to Watch Later', 'success'); closeAllActionMenus(); };
  window.shareContent = function(contentId) { var url = window.location.origin + '/content-detail.html?id=' + contentId; if (navigator.share) { navigator.share({ title: 'Check out this content', url: url }); } else { navigator.clipboard.writeText(url); showToast('Link copied', 'success'); } closeAllActionMenus(); };
  window.notInterested = function(contentId) { showToast('We\'ll show less of this', 'info'); closeAllActionMenus(); };
  function closeAllActionMenus() { document.querySelectorAll('.action-menu-dropdown').forEach(function(d) { d.classList.remove('active'); }); }
  document.addEventListener('click', function(e) { if (!e.target.closest('.card-actions')) closeAllActionMenus(); });
  
  window.viewAllTrending = function() { window.location.href = 'content-library.html?sort=trending'; };
  window.viewAllLiveStreams = function() { window.location.href = 'content-library.html?genre=Live'; };
  window.viewAllCommunityGems = function() { window.location.href = 'content-library.html?sort=popular'; };
  window.viewAllShorts = function() { window.location.href = 'content-library.html?type=shorts'; };
  window.playContent = playContent;
  
  async function loadContent() { setLoading(true, 'Loading trending content...'); hasMoreContent = true; try { var contentData = await loadTrendingContent(100, selectedFilter !== 'All' ? selectedFilter : null); processTrendingSections(contentData); renderFilterChips(); renderTrendingSections(); showToast('Trending content loaded', 'success'); } catch (error) { console.error('Error loading content:', error); showToast('Failed to load content', 'error'); } finally { setLoading(false); } }
  
  async function loadUserStreak() { if (!currentUser) { if (userStreakDisplay) userStreakDisplay.style.display = 'none'; return; } try { var response = await window.supabaseClient.from('user_streaks').select('current_streak_days').eq('user_id', currentUser.id).eq('streak_type', 'watch').single(); if (response.data && response.data.current_streak_days > 0) { userStreakDisplay.style.display = 'flex'; streakCount.textContent = response.data.current_streak_days; } } catch(e) { console.log('No streak data'); } }
  
  async function loadContinueWatching() { if (!currentUser) { continueWatchingBar.classList.remove('active'); return; } try { var response = await window.supabaseClient.from('watch_progress').select('*, Content!inner(id, title, thumbnail_url, duration)').eq('user_id', currentUser.id).eq('is_completed', false).order('updated_at', { ascending: false }).limit(1); var progress = response.data; if (progress && progress.length > 0) { var item = progress[0]; var content = item.Content; var progressPercent = content.duration > 0 ? Math.round((item.last_position / content.duration) * 100) : 0; var timeRemaining = content.duration > 0 ? formatDuration(content.duration - item.last_position) : 'Unknown'; document.getElementById('continue-thumbnail-img').src = buildThumbnailUrl(content.thumbnail_url); document.getElementById('continue-title-text').textContent = content.title; document.getElementById('continue-meta-text').textContent = progressPercent + '% complete • ' + timeRemaining + ' remaining'; document.getElementById('continue-progress-bar').style.width = progressPercent + '%'; document.getElementById('continue-watch-btn').onclick = function() { playContent(content.id); }; continueWatchingBar.classList.add('active'); } } catch(e) { console.log('No continue watching data'); } }
  
  async function loadNotifications() { if (!currentUser) { updateNotificationBadge(0); return; } try { var response = await window.supabaseClient.from('notifications').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false }).limit(20); notifications = response.data || []; updateNotificationBadge(notifications.filter(function(n) { return !n.is_read; }).length); renderNotifications(); } catch(e) { console.error('Error loading notifications:', e); } }
  function updateNotificationBadge(count) { var badge = document.getElementById('notification-count'); if (badge) { badge.textContent = count > 99 ? '99+' : count; badge.style.display = count > 0 ? 'flex' : 'none'; } }
  function renderNotifications() { var list = document.getElementById('notifications-list'); if (!list) return; if (!currentUser) { list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--slate-grey)"><i class="fas fa-bell-slash" style="font-size:48px;margin-bottom:15px"></i><p>Sign in to see notifications</p></div>'; return; } if (!notifications.length) { list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--slate-grey)"><i class="fas fa-bell" style="font-size:48px;margin-bottom:15px;opacity:0.3"></i><p>No notifications yet</p></div>'; return; } list.innerHTML = notifications.map(function(n) { return '<div class="notification-item ' + (n.is_read ? 'read' : 'unread') + '" data-id="' + n.id + '"><div class="notification-icon"><i class="fas fa-bell"></i></div><div class="notification-content"><h4>' + escapeHtml(n.title) + '</h4><p>' + escapeHtml(n.message) + '</p><span class="notification-time">' + formatTimeAgo(n.created_at) + '</span></div>' + (!n.is_read ? '<div class="notification-dot"></div>' : '') + '</div>'; }).join(''); document.querySelectorAll('.notification-item').forEach(function(item) { item.addEventListener('click', function() { markNotificationRead(item.dataset.id); }); }); }
  async function markNotificationRead(id) { await window.supabaseClient.from('notifications').update({ is_read: true }).eq('id', id); loadNotifications(); }
  async function markAllRead() { if (!currentUser) return; await window.supabaseClient.from('notifications').update({ is_read: true }).eq('user_id', currentUser.id).eq('is_read', false); loadNotifications(); showToast('All notifications marked read', 'success'); }
  
  async function loadSurpriseContent() { if (!currentUser) { showToast('Please sign in for surprises', 'info'); return; } setLoading(true, 'Finding something special...'); setTimeout(function() { setLoading(false); var surprises = allContentData.slice(0, 5); if (surprises.length > 0) { showToast('🎲 Try watching: ' + surprises[0].title, 'success'); } else { showToast('No surprises right now', 'info'); } }, 1500); }
  
  function setupInfiniteScroll() { window.addEventListener('scroll', function() { if (isLoadingMore || !hasMoreContent) return; if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 500) { isLoadingMore = true; infiniteScrollLoader.classList.add('active'); setTimeout(function() { loadTrendingContent(contentLimit, selectedFilter !== 'All' ? selectedFilter : null).then(function(newContent) { if (newContent.length === 0) { hasMoreContent = false; } else { allContentData = allContentData.concat(newContent); processTrendingSections(allContentData); renderTrendingSections(); } }).finally(function() { isLoadingMore = false; infiniteScrollLoader.classList.remove('active'); }); }, 500); } }); }
  
  function setupSearch() { var searchInput = document.getElementById('search-input'); var suggestionsDiv = document.getElementById('search-suggestions'); if (searchInput) { searchInput.addEventListener('input', function(e) { var query = e.target.value.trim(); clearTimeout(searchDebounceTimer); if (query.length < 2) { suggestionsDiv.style.display = 'none'; suggestionsDiv.innerHTML = ''; return; } searchDebounceTimer = setTimeout(function() { var matches = allContentData.filter(function(item) { return item.title && item.title.toLowerCase().includes(query.toLowerCase()); }).slice(0, 5); if (matches.length === 0) { suggestionsDiv.style.display = 'none'; return; } suggestionsDiv.innerHTML = matches.map(function(m) { return '<div class="suggestion-item" data-id="' + m.id + '"><i class="fas fa-search"></i><span>' + escapeHtml(m.title) + '</span></div>'; }).join(''); suggestionsDiv.style.display = 'block'; suggestionsDiv.querySelectorAll('.suggestion-item').forEach(function(s) { s.addEventListener('click', function() { document.getElementById('search-modal').classList.remove('active'); playContent(s.dataset.id); }); }); }, 300); }); } }
  
  function setupEventListeners() { if (searchBtn) searchBtn.addEventListener('click', function() { document.getElementById('search-modal').classList.add('active'); setTimeout(function() { document.getElementById('search-input').focus(); }, 100); }); document.getElementById('close-search-btn')?.addEventListener('click', function() { document.getElementById('search-modal').classList.remove('active'); }); if (refreshBtn) refreshBtn.addEventListener('click', function() { loadContent(); }); if (notificationsBtn) notificationsBtn.addEventListener('click', function() { document.getElementById('notifications-panel').classList.add('active'); renderNotifications(); }); document.getElementById('close-notifications')?.addEventListener('click', function() { document.getElementById('notifications-panel').classList.remove('active'); }); document.getElementById('mark-all-read')?.addEventListener('click', markAllRead); if (profileBtn) profileBtn.addEventListener('click', function() { window.location.href = currentUser ? 'profile.html' : 'login.html'; }); if (exploreAllBtn) exploreAllBtn.addEventListener('click', function() { window.location.href = 'content-library.html?sort=trending'; }); if (authLoginBtn) authLoginBtn.addEventListener('click', function() { window.location.href = 'login.html?redirect=trending_screen.html'; }); if (authCancelBtn) authCancelBtn.addEventListener('click', function() { authModal.classList.remove('active'); }); if (locationFilter) locationFilter.addEventListener('change', function() { showToast('Filtering by: ' + this.options[this.selectedIndex].text, 'info'); loadContent(); }); if (surpriseMeBtn) surpriseMeBtn.addEventListener('click', loadSurpriseContent); setupInfiniteScroll(); setupSearch(); }
  
  async function checkAuth() { setLoading(true, 'Checking authentication...'); var sessionResp = await window.supabaseClient.auth.getSession(); var session = sessionResp.data.session; if (!session || !session.user) { showToast('Please sign in', 'error'); if (authModal) authModal.classList.add('active'); setLoading(false); return false; } currentUser = session.user; console.log('Authenticated:', currentUser.email); await loadUserStreak(); await loadContinueWatching(); await loadNotifications(); setLoading(false); return true; }
  
  async function loadUserProfilePicture() { if (!currentUser) return; var placeholder = document.getElementById('userProfilePlaceholder'); if (!placeholder) return; try { var response = await window.supabaseClient.from('user_profiles').select('username, full_name, avatar_url').eq('id', currentUser.id).single(); var profile = response.data; var initial = profile?.username ? profile.username.charAt(0).toUpperCase() : currentUser.email.charAt(0).toUpperCase(); placeholder.innerHTML = '<div class="profile-placeholder">' + initial + '</div>'; } catch(e) { placeholder.innerHTML = '<div class="profile-placeholder"><i class="fas fa-user"></i></div>'; } }
  
  async function init() { var isAuthed = await checkAuth(); if (!isAuthed) return; await loadUserProfilePicture(); setupEventListeners(); await loadContent(); }
  
  init();
  
  window.supabaseClient.auth.onAuthStateChange(function(event, session) { if (event === 'SIGNED_IN' && session) { currentUser = session.user; loadUserProfilePicture(); loadUserStreak(); loadContinueWatching(); loadNotifications(); showToast('Welcome back!', 'success'); authModal.classList.remove('active'); loadContent(); } else if (event === 'SIGNED_OUT') { currentUser = null; document.getElementById('userProfilePlaceholder').innerHTML = '<div class="profile-placeholder"><i class="fas fa-user"></i></div>'; updateNotificationBadge(0); userStreakDisplay.style.display = 'none'; continueWatchingBar.classList.remove('active'); authModal.classList.add('active'); } });
});
</script>
