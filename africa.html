<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Africa Map Outline</title>
    <style>
        /* Container to center and scale the map */
        .map-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
        }

        /* Target the SVG map element */
        .africa-map {
            width: 100%;
            max-width: 500px;
            height: auto;
        }

        /* Style the continent path with CSS */
        .africa-outline {
            fill: #e0e0e0; /* Inner fill color */
            stroke: #222222; /* Outline/border color */
            stroke-width: 1.5; /* Thickness of the border */
            stroke-linejoin: round; /* Smooths corner connections */
            transition: all 0.3s ease; /* Smooth hover transition animate */
            cursor: pointer;
        }

        /* Interactive hover effect */
        .africa-outline:hover {
            fill: #4a90e2; /* Color changes on hover */
            stroke: #ffffff; /* Outline shifts to white */
            filter: drop-shadow(0px 5px 10px rgba(0,0,0,0.3)); /* Adds a shadow depth */
        }
    </style>
</head>
<body>

    <div class="map-container">
        <!-- SVG Code for a simplified Africa Continent Outline -->
        <svg class="africa-map" viewBox="0 0 320 340" xmlns="http://w3.org">
            <path class="africa-outline" d="M120,20 C145,15 190,15 220,35 C235,45 255,42 270,55 C280,65 295,75 290,95 C285,115 270,125 260,135 C250,145 255,160 250,175 C240,205 220,230 205,260 C190,290 175,315 165,335 C160,340 150,335 148,325 C140,295 140,265 125,240 C115,225 100,220 85,215 C70,210 55,215 40,205 C25,195 15,175 18,155 C20,135 40,130 50,115 C60,100 55,85 65,70 C75,55 90,45 105,35 C110,32 115,22 120,20 Z" />
        </svg>
    </div>

</body>
</html>
