<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>News Article | The Signal - Bantu Stream Connect</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<!-- Supabase JS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ===== CSS VARIABLES ===== */
:root {
    --deep-black: #0A0E12;
    --deep-navy: #0F172A;
    --soft-white: #F8FAFC;
    --slate-grey: #94A3B8;
    --bantu-blue: #1D4ED8;
    --warm-gold: #F59E0B;
    --error-color: #EF4444;
    --success-color: #10B981;
    --news-red: #DC2626;
    --news-orange: #EA580C;
    --news-blue: #2563EB;
    --card-bg: rgba(15, 23, 42, 0.6);
    --card-border: rgba(148, 163, 184, 0.2);
}

body.theme-light {
    --deep-black: #F8FAFC;
    --deep-navy: #E2E8F0;
    --soft-white: #0F172A;
    --slate-grey: #475569;
    --card-bg: rgba(255, 255, 255, 0.85);
    --card-border: rgba(0, 0, 0, 0.1);
    background: #F1F5F9;
}

body.theme-high-contrast {
    --deep-black: #000000;
    --deep-navy: #050505;
    --soft-white: #FFFFFF;
    --slate-grey: #CCCCCC;
    --bantu-blue: #FFD700;
    --warm-gold: #00FFFF;
    --news-red: #FF0000;
    --card-bg: #0A0A0A;
    --card-border: #FFFFFF;
    background: #000000;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Inter', sans-serif;
    background: var(--deep-black);
    color: var(--soft-white);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background-color 0.3s ease, color 0.3s ease;
}

/* ===== LOADING SCREEN ===== */
.loading-screen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: var(--deep-black); display: flex; flex-direction: column;
    align-items: center; justify-content: center; z-index: 1000;
}
.spinner {
    width: 50px; height: 50px; border: 3px solid rgba(255,255,255,0.1);
    border-radius: 50%; border-top-color: var(--news-red);
    animation: spin 1s linear infinite; margin-bottom: 20px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== HEADER ===== */
.header {
    background: rgba(10,14,18,0.9); backdrop-filter: blur(20px);
    padding: 0.75rem 1.5rem; position: sticky; top: 0; z-index: 100;
    border-bottom: 1px solid var(--card-border);
    display: flex; justify-content: space-between; align-items: center;
    width: 100%;
}
.logo { display: flex; align-items: center; gap: 0.75rem; cursor: pointer; }
.logo-icon {
    width: 2.5rem; height: 2.5rem; border-radius: 0.625rem;
    display: flex; align-items: center; justify-content: center;
    background: transparent; border: 1px solid rgba(255, 255, 255, 0.1);
}
.logo-icon img { width: 100%; height: 100%; object-fit: contain; border-radius: 0.625rem; }
.logo-text {
    font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 1.125rem;
    background: linear-gradient(to right, var(--soft-white), var(--bantu-blue));
    -webkit-background-clip: text; background-clip: text; color: transparent;
}
.back-btn {
    width: 2.375rem; height: 2.375rem; border-radius: 50%;
    background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
    color: var(--soft-white); display: flex; align-items: center;
    justify-content: center; cursor: pointer; transition: all 0.3s ease;
}
.back-btn:hover { background: rgba(255, 255, 255, 0.2); transform: translateY(-2px); }
.header-actions { display: flex; gap: 0.625rem; align-items: center; }
.icon-btn {
    width: 2.375rem; height: 2.375rem; border-radius: 50%;
    background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
    color: var(--soft-white); display: flex; align-items: center;
    justify-content: center; cursor: pointer; transition: all 0.3s ease;
}
.icon-btn:hover { background: rgba(255, 255, 255, 0.2); transform: translateY(-2px); }

/* ===== CONTAINER ===== */
.container { max-width: 1200px; margin: 0 auto; padding: 0 24px 60px; position: relative; z-index: 2; }

/* ===== ARTICLE STYLES ===== */
.article-header { margin-bottom: 32px; }
.article-category {
    display: inline-block;
    background: var(--news-red);
    color: white;
    padding: 6px 16px;
    border-radius: 30px;
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 20px;
}
.article-title {
    font-size: 42px;
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 20px;
    color: var(--soft-white);
}
.article-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--card-border);
    margin-bottom: 20px;
    color: var(--slate-grey);
    font-size: 14px;
}
.article-meta i { margin-right: 6px; color: var(--news-red); }
.article-thumbnail {
    width: 100%;
    border-radius: 24px;
    overflow: hidden;
    margin-bottom: 32px;
}
.article-thumbnail img {
    width: 100%;
    height: auto;
    object-fit: cover;
}
.article-body {
    font-size: 18px;
    line-height: 1.7;
    margin-bottom: 40px;
}
.article-body p {
    margin-bottom: 20px;
}
.article-body img {
    max-width: 100%;
    border-radius: 16px;
    margin: 24px 0;
}
.article-body h2 {
    font-size: 28px;
    margin: 32px 0 16px;
}
.article-body blockquote {
    border-left: 4px solid var(--news-red);
    padding: 16px 24px;
    margin: 24px 0;
    background: rgba(220, 38, 38, 0.1);
    border-radius: 12px;
    font-style: italic;
}
.article-body blockquote cite {
    display: block;
    margin-top: 12px;
    font-size: 14px;
    color: var(--news-red);
    font-style: normal;
}
.article-image {
    margin: 24px 0;
}
.article-image span {
    display: block;
    font-size: 14px;
    color: var(--slate-grey);
    margin-top: 8px;
    text-align: center;
}

/* ===== JOURNALIST BOX ===== */
.journalist-box {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 40px;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    align-items: center;
    backdrop-filter: blur(10px);
}
.journalist-avatar-large {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--bantu-blue), var(--news-red));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    color: white;
    flex-shrink: 0;
    overflow: hidden;
}
.journalist-avatar-large img { width: 100%; height: 100%; object-fit: cover; }
.journalist-info-large { flex: 1; }
.journalist-info-large h3 {
    font-size: 22px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
}
.verified-badge { color: var(--success-color); font-size: 18px; }
.journalist-specialty {
    color: var(--news-red);
    margin-bottom: 8px;
    font-size: 14px;
}
.journalist-bio { color: var(--slate-grey); margin-bottom: 12px; line-height: 1.5; }
.follow-journalist-btn {
    background: transparent;
    border: 1px solid var(--news-red);
    color: var(--news-red);
    padding: 10px 24px;
    border-radius: 30px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
}
.follow-journalist-btn:hover {
    background: var(--news-red);
    color: white;
}

/* ===== ACTION BUTTONS ===== */
.action-buttons {
    display: flex;
    gap: 16px;
    margin-bottom: 40px;
    flex-wrap: wrap;
}
.action-btn {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--card-border);
    padding: 12px 24px;
    border-radius: 40px;
    color: var(--soft-white);
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
}
.action-btn:hover {
    background: var(--news-red);
    border-color: var(--news-red);
}
.action-btn.liked { background: var(--news-red); }

/* ===== COMMENTS SECTION ===== */
.comments-section {
    margin-top: 48px;
    padding-top: 32px;
    border-top: 1px solid var(--card-border);
}
.comments-title {
    font-size: 24px;
    margin-bottom: 24px;
}
.comment-form {
    display: flex;
    gap: 16px;
    margin-bottom: 32px;
    flex-wrap: wrap;
}
.comment-input {
    flex: 1;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--card-border);
    border-radius: 30px;
    padding: 14px 20px;
    color: var(--soft-white);
    font-family: inherit;
    resize: vertical;
}
.comment-input:focus {
    outline: none;
    border-color: var(--news-red);
}
.comment-submit {
    background: var(--news-red);
    border: none;
    padding: 0 28px;
    border-radius: 30px;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
}
.comment-submit:hover { transform: translateY(-2px); }
.comment-list { display: flex; flex-direction: column; gap: 20px; }
.comment-item {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 16px;
}
.comment-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
}
.comment-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--bantu-blue), var(--news-red));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: bold;
    color: white;
}
.comment-author {
    font-weight: 600;
    color: var(--soft-white);
}
.comment-time {
    font-size: 11px;
    color: var(--slate-grey);
    margin-left: auto;
}
.comment-text { color: var(--soft-white); line-height: 1.5; }

/* ===== RELATED NEWS ===== */
.related-section { margin-top: 48px; }
.related-title {
    font-size: 24px;
    margin-bottom: 24px;
}
.related-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
}
.related-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.3s ease;
}
.related-card:hover {
    transform: translateY(-4px);
    border-color: var(--news-red);
}
.related-card img {
    width: 100%;
    height: 140px;
    object-fit: cover;
}
.related-card-info { padding: 12px; }
.related-card-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--soft-white);
}
.related-card-stats {
    font-size: 11px;
    color: var(--slate-grey);
}

/* ===== TOAST ===== */
#toast-container {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.toast {
    padding: 12px 20px;
    border-radius: 12px;
    color: white;
    animation: slideIn 0.3s ease;
    background: rgba(0,0,0,0.9);
}
.toast.success { background: var(--success-color); }
.toast.error { background: var(--error-color); }
.toast.warning { background: var(--warm-gold); color: #000; }
@keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
    .article-title { font-size: 28px; }
    .article-body { font-size: 16px; }
    .journalist-box { flex-direction: column; text-align: center; }
    .related-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div id="loading" class="loading-screen">
    <div class="spinner"></div>
    <div id="loading-text">Loading article...</div>
</div>

<header class="header">
    <div class="logo" onclick="window.location.href='news.html'">
        <div class="logo-icon">
            <img src="assets/icon/bantu_stream_connect_icon.png" alt="Logo" onerror="this.style.display='none'">
        </div>
        <div class="logo-text">BANTU STREAM CONNECT</div>
    </div>
    <div class="header-actions">
        <button class="icon-btn" id="theme-toggle-btn"><i class="fas fa-palette"></i></button>
        <button class="back-btn" onclick="window.location.href='news.html'"><i class="fas fa-arrow-left"></i></button>
    </div>
</header>

<main class="container">
    <article>
        <div class="article-header">
            <div class="article-category" id="article-category">Loading...</div>
            <h1 class="article-title" id="article-title">Loading article...</h1>
            <div class="article-meta" id="article-meta">
                <span><i class="fas fa-calendar"></i> <span id="publish-date">-</span></span>
                <span><i class="fas fa-clock"></i> <span id="read-time">3</span> min read</span>
                <span><i class="fas fa-newspaper"></i> <span id="source-name">The Signal</span></span>
            </div>
        </div>

        <div class="article-thumbnail" id="article-thumbnail">
            <img src="" alt="Article thumbnail">
        </div>

        <div class="action-buttons">
            <button class="action-btn" id="like-btn"><i class="fas fa-heart"></i> <span id="like-count">0</span> Likes</button>
            <button class="action-btn" id="share-btn"><i class="fas fa-share-alt"></i> Share</button>
            <button class="action-btn" id="save-btn"><i class="fas fa-bookmark"></i> Save</button>

            <p>Loading content...</p>

            <div class="comment-form">
                <textarea class="comment-input" id="comment-input" rows="2" placeholder="Join the discussion..."></textarea>
                <button class="comment-submit" id="comment-submit-btn">Post</button>

            <div class="comment-list" id="comment-list">
                <p style="color: var(--slate-grey); text-align: center;">No comments yet. Be the first!</p>
            </div>

            <h3 class="related-title"><i class="fas fa-fire"></i> Related News</h3>

                <p style="color: var(--slate-grey);">Loading related content...</p>
            </div>
        </div>
    </article>
</main>

<div id="toast-container"></div>

<script>
// ===== SUPABASE CONFIGURATION =====
const SUPABASE_URL = 'https://ydnxqnbjoshvxteevemc.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlkbnhxbmJqb3Nodnh0ZWV2ZW1jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc2MzI0OTMsImV4cCI6MjA3MzIwODQ5M30.NlaCCnLPSz1mM7AFeSlfZQ78kYEKUMh_Fi-7P_ccs_U';

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ===== GLOBAL STATE =====
let currentUser = null;
let currentArticle = null;
let currentContentId = null;
let isLiked = false;
let cachedSession = null;

// ===== HELPER FUNCTIONS =====
function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function formatNumber(num) {
    if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
    if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
    return num?.toString() || '0';
}

function showToast(message, type = 'info') {
    const container = document.getElementById('toast-container');
    if (!container) return;
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-triangle' : 'fa-info-circle';
    toast.innerHTML = `<i class="fas ${icon}"></i> ${escapeHtml(message)}`;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}

function showLoading() {
    const loading = document.getElementById('loading');
    if (loading) loading.style.display = 'flex';
}

function hideLoading() {
    const loading = document.getElementById('loading');
    if (loading) loading.style.display = 'none';
}

// ===== AUTH WITH CACHING (fixes lock issues) =====
async function getSessionSafe() {
    if (cachedSession) return cachedSession;
    const { data } = await supabaseClient.auth.getSession();
    cachedSession = data.session;
    return cachedSession;
}

async function initAuth() {
    const session = await getSessionSafe();
    currentUser = session?.user || null;
    return currentUser;
}

// ===== SAFE ARTICLE BODY RENDERER (JSON blocks) =====
function renderArticleBody(blocks) {
    if (!blocks) return '<p>No content available.</p>';
    
    // Handle string fallback
    if (typeof blocks === 'string') {
        return blocks.split('\n').map(p => `<p>${escapeHtml(p)}</p>`).join('');
    }
    
    // Handle array of blocks
    if (Array.isArray(blocks) && blocks.length > 0) {
        return blocks.map(block => {
            switch (block.type) {
                case 'paragraph':
                    return `<p>${escapeHtml(block.text || '')}</p>`;
                case 'heading':
                    return `<h2>${escapeHtml(block.text || '')}</h2>`;
                case 'image':
                    return `
                        <div class="article-image">
                            <img src="${escapeHtml(block.url || '')}" alt="${escapeHtml(block.alt || '')}">
                            ${block.caption ? `<span>${escapeHtml(block.caption)}</span>` : ''}
                        </div>
                    `;
                case 'quote':
                    return `
                        <blockquote>
                            ${escapeHtml(block.text || '')}
                            ${block.author ? `<cite>— ${escapeHtml(block.author)}</cite>` : ''}
                        </blockquote>
                    `;
                default:
                    return `<p>${escapeHtml(block.text || '')}</p>`;
            }
        }).join('');
    }
    
    return '<p>Content is being prepared.</p>';
}

// ===== LOAD ARTICLE (CLEAN, NO VIEW TRACKING, NO REAL-TIME) =====
async function loadArticleDetail() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    
    if (!id) {
        showToast('No article specified', 'error');
        window.location.href = 'news.html';
        return;
    }
    
    currentContentId = parseInt(id);
    
    try {
        // IMPORTANT: Only fetch news content_type, no views tracking
        const { data, error } = await supabaseClient
            .from('Content')
            .select(`
                id,
                title,
                description,
                thumbnail_url,
                created_at,
                likes_count,
                comments_count,
                content_metadata,
                article_body,
                read_time,
                source_name,
                creator_id,
                user_profiles:creator_id (
                    id,
                    full_name,
                    username,
                    avatar_url,
                    bio,
                    is_journalist,
                    journalist_metadata
                )
            `)
            .eq('id', currentContentId)
            .eq('content_type', 'news')
            .single();
        
        if (error) throw error;
        if (!data) throw new Error('Article not found');
        
        currentArticle = data;
        renderArticle(data);
        await loadComments(currentContentId);
        await loadRelatedNews(data);
        await checkIfLiked();
        
    } catch (err) {
        console.error('Article load error:', err);
        showToast('Failed to load article', 'error');
        hideLoading();
    }
}

// ===== RENDER ARTICLE =====
function renderArticle(article) {
    document.title = `${article.title} | The Signal`;
    
    // Category from metadata
    const category = article.content_metadata?.category || 'News';
    document.getElementById('article-category').textContent = category.toUpperCase();
    document.getElementById('article-title').textContent = article.title;
    
    // Date formatting
    const date = new Date(article.created_at).toLocaleDateString('en-US', {
        year: 'numeric', month: 'long', day: 'numeric'
    });
    document.getElementById('publish-date').textContent = date;
    document.getElementById('read-time').textContent = article.read_time || 3;
    document.getElementById('source-name').textContent = article.source_name || 'The Signal';
    document.getElementById('like-count').textContent = formatNumber(article.likes_count || 0);
    document.getElementById('comment-count').textContent = article.comments_count || 0;
    
    // Thumbnail
    const thumbnailImg = document.querySelector('#article-thumbnail img');
    if (thumbnailImg) {
        thumbnailImg.src = article.thumbnail_url || 'https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=1200&h=600&fit=crop';
        thumbnailImg.alt = article.title;
    }
    
    // Article body
    const bodyContainer = document.getElementById('article-body');
    bodyContainer.innerHTML = renderArticleBody(article.article_body);
    
    // Render journalist ONLY if user_profiles exists AND is_journalist === true
    renderJournalistInfo(article.user_profiles);
    
    hideLoading();
}

// ===== JOURNALIST RENDER (filtered correctly) =====
function renderJournalistInfo(creator) {
    const container = document.getElementById('journalist-container');
    
    // CRITICAL FIX: Only show if creator exists AND is officially a journalist
    if (!creator || !creator.is_journalist) {
        container.innerHTML = '';
        return;
    }
    
    const meta = creator.journalist_metadata || {};
    const specialty = meta.specialty || 'Investigative Journalist';
    const country = meta.country || 'Africa';
    const trustScore = meta.trust_score || 94;
    const displayName = creator.full_name || creator.username || 'Journalist';
    const bio = creator.bio || 'Independent journalist committed to factual reporting from across the continent.';
    const avatarUrl = creator.avatar_url;
    
    container.innerHTML = `
        <div class="journalist-box">
            <div class="journalist-avatar-large">
                ${avatarUrl ? `<img src="${escapeHtml(avatarUrl)}" alt="${escapeHtml(displayName)}">` : '<i class="fas fa-user"></i>'}
            </div>
            <div class="journalist-info-large">
                <h3>
                    ${escapeHtml(displayName)}
                    <span class="verified-badge"><i class="fas fa-check-circle"></i></span>
                </h3>
                <div class="journalist-specialty">${escapeHtml(specialty)} • ${escapeHtml(country)} • ${trustScore}% Trust Score</div>
                <div class="journalist-bio">${escapeHtml(bio)}</div>
                <button class="follow-journalist-btn" id="follow-journalist-btn" data-id="${creator.id}">
                    <i class="fas fa-plus-circle"></i> Follow Journalist
                </button>
            </div>
        </div>
    `;
    
    document.getElementById('follow-journalist-btn')?.addEventListener('click', () => followJournalist(creator.id));
}

// ===== LIKE TOGGLE (no view increment) =====
async function toggleLike() {
    if (!currentUser) {
        showToast('Please sign in to like articles', 'warning');
        window.location.href = `login.html?redirect=news-detail.html?id=${currentContentId}`;
        return;
    }
    
    try {
        if (isLiked) {
            await supabaseClient
                .from('content_likes')
                .delete()
                .eq('content_id', currentContentId)
                .eq('user_id', currentUser.id);
            isLiked = false;
        } else {
            await supabaseClient
                .from('content_likes')
                .insert({ content_id: currentContentId, user_id: currentUser.id });
            isLiked = true;
        }
        
        // Refresh like count
        const { data } = await supabaseClient
            .from('Content')
            .select('likes_count')
            .eq('id', currentContentId)
            .single();
        
        if (data) {
            document.getElementById('like-count').textContent = formatNumber(data.likes_count || 0);
        }
        
        const likeBtn = document.getElementById('like-btn');
        if (isLiked) {
            likeBtn.classList.add('liked');
        } else {
            likeBtn.classList.remove('liked');
        }
        
    } catch (err) {
        console.error('Like error:', err);
        showToast('Failed to update like', 'error');
    }
}

async function checkIfLiked() {
    if (!currentUser) return;
    try {
        const { data } = await supabaseClient
            .from('content_likes')
            .select('id')
            .eq('content_id', currentContentId)
            .eq('user_id', currentUser.id)
            .maybeSingle();
        isLiked = !!data;
        if (isLiked) document.getElementById('like-btn')?.classList.add('liked');
    } catch (err) {
        console.error('Check like error:', err);
    }
}

function shareArticle() {
    const url = window.location.href;
    const title = currentArticle?.title || 'Check out this article';
    if (navigator.share) {
        navigator.share({ title, url }).catch(() => {});
    } else {
        navigator.clipboard.writeText(url);
        showToast('Link copied to clipboard!', 'success');
    }
}

async function saveArticle() {
    if (!currentUser) {
        showToast('Please sign in to save articles', 'warning');
        window.location.href = `login.html?redirect=news-detail.html?id=${currentContentId}`;
        return;
    }
    try {
        await supabaseClient.from('favorites').insert({ user_id: currentUser.id, content_id: currentContentId });
        showToast('Article saved to your favorites!', 'success');
    } catch (err) {
        if (err.code === '23505') showToast('Article already saved', 'info');
        else showToast('Failed to save article', 'error');
    }
}

// ===== COMMENTS =====
async function loadComments(contentId) {
    const { data, error } = await supabaseClient
        .from('comments')
        .select('id, comment_text, created_at, author_name, author_avatar, user_id')
        .eq('content_id', contentId)
        .order('created_at', { ascending: false })
        .limit(50);
    if (!error) renderComments(data || []);
}

function renderComments(comments) {
    const container = document.getElementById('comment-list');
    if (!comments.length) {
        container.innerHTML = '<p style="color: var(--slate-grey); text-align: center;">No comments yet. Be the first!</p>';
        return;
    }
    container.innerHTML = comments.map(comment => `
        <div class="comment-item">
            <div class="comment-header">
                <div class="comment-avatar">${comment.author_name?.charAt(0) || 'U'}</div>
                <span class="comment-author">${escapeHtml(comment.author_name || 'Anonymous')}</span>
                <span class="comment-time">${timeAgo(comment.created_at)}</span>
            </div>
            <div class="comment-text">${escapeHtml(comment.comment_text)}</div>
        </div>
    `).join('');
}

async function postComment() {
    const commentText = document.getElementById('comment-input').value.trim();
    if (!commentText) return showToast('Please enter a comment', 'warning');
    if (!currentUser) {
        showToast('Please sign in to comment', 'warning');
        window.location.href = `login.html?redirect=news-detail.html?id=${currentContentId}`;
        return;
    }
    const { error } = await supabaseClient.from('comments').insert({
        content_id: currentContentId, user_id: currentUser.id,
        author_name: currentUser.email?.split('@')[0] || 'User', comment_text: commentText
    });
    if (error) return showToast('Failed to post comment', 'error');
    document.getElementById('comment-input').value = '';
    showToast('Comment posted!', 'success');
    loadComments(currentContentId);
    const { data } = await supabaseClient.from('Content').select('comments_count').eq('id', currentContentId).single();
    if (data) document.getElementById('comment-count').textContent = data.comments_count || 0;
}

// ===== RELATED NEWS (same category, no videos) =====
async function loadRelatedNews(article) {
    const category = article.content_metadata?.category;
    let query = supabaseClient.from('Content').select('id, title, thumbnail_url').eq('content_type', 'news').neq('id', article.id).limit(6);
    if (category) query = query.filter('content_metadata->>category', 'eq', category);
    const { data, error } = await query;
    if (!error) renderRelatedNews(data || []);
    else document.getElementById('related-grid').innerHTML = '<p style="color: var(--slate-grey);">No related content found</p>';
}

function renderRelatedNews(newsItems) {
    const container = document.getElementById('related-grid');
    if (!newsItems.length) {
        container.innerHTML = '<p style="color: var(--slate-grey);">No related content found</p>';
        return;
    }
    container.innerHTML = newsItems.map(item => `
        <div class="related-card" onclick="window.location.href='news-detail.html?id=${item.id}'">
            <img src="${escapeHtml(item.thumbnail_url || 'https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=400&h=200&fit=crop')}" alt="${escapeHtml(item.title)}">
            <div class="related-card-info">
                <h4 class="related-card-title">${escapeHtml(item.title)}</h4>
            </div>
        </div>
    `).join('');
}

function timeAgo(date) {
    const seconds = Math.floor((new Date() - new Date(date)) / 1000);
    if (seconds < 60) return 'just now';
    const minutes = Math.floor(seconds / 60);
    if (minutes < 60) return `${minutes}m ago`;
    const hours = Math.floor(minutes / 60);
    if (hours < 24) return `${hours}h ago`;
    const days = Math.floor(hours / 24);
    if (days < 7) return `${days}d ago`;
    return new Date(date).toLocaleDateString();
}

async function followJournalist(creatorId) {
    if (!currentUser) {
        showToast('Please sign in to follow journalists', 'warning');
        window.location.href = `login.html?redirect=news-detail.html?id=${currentContentId}`;
        return;
    }
    try {
        await supabaseClient.from('connectors').insert({ connector_id: currentUser.id, connected_id: creatorId, connection_type: 'creator' });
        showToast('Now following this journalist!', 'success');
    } catch (err) {
        if (err.code === '23505') showToast('Already following this journalist', 'info');
        else showToast('Failed to follow', 'error');
    }
}

function initTheme() {
    const savedTheme = localStorage.getItem('bantu_theme') || 'dark';
    document.body.classList.add(`theme-${savedTheme}`);
    document.getElementById('theme-toggle-btn')?.addEventListener('click', () => {
        const isDark = document.body.classList.contains('theme-dark');
        document.body.classList.remove('theme-dark', 'theme-light', 'theme-high-contrast');
        const newTheme = isDark ? 'light' : 'dark';
        document.body.classList.add(`theme-${newTheme}`);
        localStorage.setItem('bantu_theme', newTheme);
    });
}

async function initialize() {
    showLoading();
    initTheme();
    await initAuth();
    await loadArticleDetail();
    document.getElementById('like-btn')?.addEventListener('click', toggleLike);
    document.getElementById('share-btn')?.addEventListener('click', shareArticle);
    document.getElementById('save-btn')?.addEventListener('click', saveArticle);
    document.getElementById('comment-submit-btn')?.addEventListener('click', postComment);
}

initialize();
</script>
