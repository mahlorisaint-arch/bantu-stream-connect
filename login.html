<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Login - Bantu Stream Connect</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --deep-black: #0A0E12;
            --deep-navy: #0F172A;
            --soft-white: #F8FAFC;
            --slate-grey: #94A3B8;
            --bantu-blue: #1D4ED8;
            --warm-gold: #F59E0B;
            --error-color: #EF4444;
            --success-color: #10B981;
            --glow-cycle-1: #00A3FF;
            --glow-cycle-2: #0066FF;
            --glow-cycle-3: #8B5CF6;
            --glow-cycle-4: #EC4899;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--deep-black);
            color: var(--soft-white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            overflow-y: auto;
            overflow-x: hidden;
        }
        
        /* Make body scrollable */
        body::-webkit-scrollbar {
            width: 8px;
        }
        
        body::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
            border-radius: 10px;
        }
        
        body::-webkit-scrollbar-thumb {
            background: var(--bantu-blue);
            border-radius: 10px;
        }
        
        body::-webkit-scrollbar-thumb:hover {
            background: var(--warm-gold);
        }
        
        /* Animated Background - fixed to stay behind content while scrolling */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
        }
        
        .glow-cycle {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.1;
            animation: float 8s infinite ease-in-out;
        }
        
        .glow-1 {
            width: 400px;
            height: 400px;
            background: var(--glow-cycle-1);
            top: 10%;
            left: 5%;
            animation-delay: 0s;
        }
        
        .glow-2 {
            width: 300px;
            height: 300px;
            background: var(--glow-cycle-2);
            top: 60%;
            right: 10%;
            animation-delay: 2s;
        }
        
        .glow-3 {
            width: 350px;
            height: 350px;
            background: var(--glow-cycle-3);
            bottom: 10%;
            left: 20%;
            animation-delay: 4s;
        }
        
        .glow-4 {
            width: 250px;
            height: 250px;
            background: var(--glow-cycle-4);
            top: 20%;
            right: 20%;
            animation-delay: 6s;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }
        
        .login-container {
            position: relative;
            z-index: 2;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            margin: 20px auto;
            transition: transform 0.3s ease;
        }
        
        .login-container:hover {
            transform: translateY(-5px);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            transition: transform 0.3s ease;
        }
        
        .logo-icon:hover {
            transform: scale(1.05);
        }
        
        .logo-icon img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            filter: drop-shadow(0 0 8px rgba(29, 78, 216, 0.3));
        }
        
        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 28px;
            background: linear-gradient(135deg, var(--soft-white) 0%, var(--bantu-blue) 50%, var(--warm-gold) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1.5px;
            margin-top: 8px;
        }
        
        .logo-sub {
            font-size: 12px;
            color: var(--slate-grey);
            letter-spacing: 2px;
            margin-top: 5px;
            font-weight: 300;
        }
        
        .tagline {
            text-align: center;
            color: var(--slate-grey);
            margin-bottom: 30px;
            font-size: 14px;
            font-style: italic;
            border-top: 1px solid rgba(148, 163, 184, 0.2);
            padding-top: 20px;
        }
        
        .mode-toggle {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 25px;
        }
        
        .mode-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: var(--slate-grey);
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .mode-btn.active {
            background: linear-gradient(135deg, var(--bantu-blue), var(--warm-gold));
            color: var(--soft-white);
            box-shadow: 0 4px 12px rgba(29, 78, 216, 0.3);
        }
        
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--soft-white);
            font-weight: 500;
            font-size: 14px;
        }
        
        .form-input {
            width: 100%;
            padding: 16px 45px 16px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 12px;
            color: var(--soft-white);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--bantu-blue);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(29, 78, 216, 0.1);
        }
        
        .input-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--slate-grey);
            cursor: pointer;
            transition: color 0.2s ease;
        }
        
        .input-icon:hover {
            color: var(--bantu-blue);
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
            margin-top: 10px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--bantu-blue), var(--warm-gold));
            color: var(--soft-white);
            position: relative;
            overflow: hidden;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(29, 78, 216, 0.4);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--soft-white);
            border: 1px solid rgba(148, 163, 184, 0.2);
        }
        
        .btn-secondary:hover {
            border-color: var(--bantu-blue);
            background: rgba(255, 255, 255, 0.1);
        }
        
        .divider {
            text-align: center;
            margin: 25px 0;
            color: var(--slate-grey);
            font-size: 14px;
            position: relative;
        }
        
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(148, 163, 184, 0.2);
        }
        
        .divider span {
            background: rgba(15, 23, 42, 0.85);
            padding: 0 20px;
            position: relative;
        }
        
        .social-login {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .social-btn {
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: var(--soft-white);
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .social-btn:hover {
            border-color: var(--bantu-blue);
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }
        
        .social-note {
            text-align: center;
            margin-top: 15px;
            color: var(--warm-gold);
            font-size: 12px;
            font-style: italic;
        }
        
        .error-message {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: var(--error-color);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
            backdrop-filter: blur(4px);
        }
        
        .success-message {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.4);
            color: var(--success-color);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
            backdrop-filter: blur(4px);
        }
        
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: var(--soft-white);
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .password-requirements {
            margin-top: 8px;
            font-size: 12px;
            color: var(--slate-grey);
        }
        
        .requirement {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
            transition: all 0.2s ease;
        }
        
        .requirement i {
            font-size: 8px;
        }
        
        .requirement.valid {
            color: var(--success-color);
        }
        
        .requirement.invalid {
            color: var(--slate-grey);
        }
        
        /* Responsive adjustments */
        @media (max-width: 480px) {
            body {
                padding: 20px 16px;
            }
            
            .login-container {
                padding: 28px 20px;
                margin: 10px auto;
            }
            
            .logo-icon {
                width: 70px;
                height: 70px;
            }
            
            .logo-icon img {
                width: 50px;
                height: 50px;
            }
            
            .logo-text {
                font-size: 24px;
            }
            
            .social-login {
                grid-template-columns: 1fr;
            }
            
            .btn {
                padding: 14px;
            }
        }
        
        /* Animation for form switching */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        form {
            animation: fadeIn 0.3s ease;
        }
        
        /* Custom focus styles */
        .form-input:focus + .input-icon {
            color: var(--bantu-blue);
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="animated-bg">
        <div class="glow-cycle glow-1"></div>
        <div class="glow-cycle glow-2"></div>
        <div class="glow-cycle glow-3"></div>
        <div class="glow-cycle glow-4"></div>
    </div>

    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">
                <!-- Custom Logo Image from assets path -->
                <img src="assets/icon/bantu_stream_connect_icon.png" alt="Bantu Stream Connect" onerror="this.onerror=null; this.parentElement.innerHTML='<svg width=\'50\' height=\'50\' viewBox=\'0 0 40 40\' fill=\'none\' xmlns=\'http://www.w3.org/2000/svg\'><rect width=\'40\' height=\'40\' rx=\'8\' fill=\'#0F172A\'/><path d=\'M8 20 L12 16 L16 22 L20 18 L24 24 L28 20 L32 26\' stroke=\'url(#pulse-gradient)\' stroke-width=\'3\' stroke-linecap=\'round\' stroke-linejoin=\'round\'/><circle cx=\'32\' cy=\'26\' r=\'3\' fill=\'#F59E0B\'/><defs><linearGradient id=\'pulse-gradient\' x1=\'8\' y1=\'20\' x2=\'32\' y2=\'26\'><stop stop-color=\'#1D4ED8\'/><stop offset=\'1\' stop-color=\'#F59E0B\'/></linearGradient></defs></svg>';">
            </div>
            <div class="logo-text">BANTU STREAM CONNECT</div>
            <div class="logo-sub">PULSE • CONNECT • STREAM</div>
        </div>
        
        <p class="tagline">"No DNA, just RSA"</p>
        
        <!-- Mode Toggle -->
        <div class="mode-toggle">
            <button class="mode-btn active" id="loginBtnTab">Sign In</button>
            <button class="mode-btn" id="signupBtnTab">Sign Up</button>
        </div>
        
        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>
        
        <!-- Login Form -->
        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-input" id="loginEmail" placeholder="you@example.com" required autocomplete="email">
                <i class="fas fa-envelope input-icon"></i>
            </div>
            
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-input" id="loginPassword" placeholder="Your password" required autocomplete="current-password">
                <i class="fas fa-eye input-icon" id="toggleLoginPassword"></i>
            </div>
            
            <button type="submit" class="btn btn-primary" id="loginSubmitBtn">
                <span>Sign In to Bantu Stream Connect</span>
            </button>
        </form>
        
        <!-- Sign Up Form with Username Field -->
        <form id="signupForm" style="display: none;">
            <!-- NEW: Username Field -->
            <div class="form-group">
                <label class="form-label">Username</label>
                <input 
                    type="text" 
                    class="form-input" 
                    id="signupUsername" 
                    placeholder="Choose a unique username (min 3 characters)" 
                    required
                    autocomplete="off"
                >
                <i class="fas fa-user input-icon"></i>
                <div class="password-requirements" style="margin-top: 4px;">
                    <div class="requirement invalid" id="usernameLengthReq">
                        <i class="fas fa-circle"></i>
                        At least 3 characters
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-input" id="signupEmail" placeholder="you@example.com" required autocomplete="email">
                <i class="fas fa-envelope input-icon"></i>
            </div>
            
            <div class="form-group">
                <label class="form-label">Create Password</label>
                <input type="password" class="form-input" id="signupPassword" placeholder="Create a strong password" required autocomplete="new-password">
                <i class="fas fa-eye input-icon" id="toggleSignupPassword"></i>
                
                <div class="password-requirements">
                    <div class="requirement invalid" id="reqLength">
                        <i class="fas fa-circle"></i>
                        At least 6 characters
                    </div>
                    <div class="requirement invalid" id="reqUppercase">
                        <i class="fas fa-circle"></i>
                        One uppercase letter
                    </div>
                    <div class="requirement invalid" id="reqNumber">
                        <i class="fas fa-circle"></i>
                        One number
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-input" id="signupConfirmPassword" placeholder="Confirm your password" required autocomplete="off">
                <i class="fas fa-eye input-icon" id="toggleConfirmPassword"></i>
            </div>
            
            <button type="submit" class="btn btn-primary" id="signupSubmitBtn">
                <span>Create Bantu Stream Connect Account</span>
            </button>
        </form>
        
        <div class="divider"><span>Or continue with</span></div>
        
        <div class="social-login">
            <button class="social-btn" id="googleLogin">
                <i class="fab fa-google"></i> Google
            </button>
            <button class="social-btn" id="githubLogin">
                <i class="fab fa-github"></i> GitHub
            </button>
        </div>
        
        <p class="social-note">⭐ Quick access: Use Google or GitHub for instant connection to Bantu Stream Connect</p>
    </div>

    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://ydnxqnbjoshvxteevemc.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlkbnhxbmJqb3Nodnh0ZWV2ZW1jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc2MzI0OTMsImV4cCI6MjA3MzIwODQ5M30.NlaCCnLPSz1mM7AFeSlfZQ78kYEKUMh_Fi-7P_ccs_U';

        // Initialize Supabase client
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // TARGET REDIRECT URL - Bantu Stream Connect main site
        const TARGET_REDIRECT_URL = 'https://bantustreamconnect.com/';

        // State variables
        let isLoginMode = true;

        // DOM Elements
        const loginBtnTab = document.getElementById('loginBtnTab');
        const signupBtnTab = document.getElementById('signupBtnTab');
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');

        // Helper: Perform final redirect to bantustreamconnect.com
        function redirectToTarget() {
            console.log('Redirecting to Bantu Stream Connect:', TARGET_REDIRECT_URL);
            window.location.href = TARGET_REDIRECT_URL;
        }

        // Check if user is already logged in and redirect to target
        async function checkSession() {
            try {
                const { data: { session }, error } = await supabaseClient.auth.getSession();
                
                if (error) {
                    console.error('Session check error:', error);
                    return;
                }
                
                if (session) {
                    console.log('User already logged in, redirecting to Bantu Stream Connect');
                    redirectToTarget();
                }
            } catch (error) {
                console.error('Error checking session:', error);
            }
        }

        // Toggle between login and signup forms
        function toggleFormMode() {
            if (isLoginMode) {
                loginForm.style.display = 'none';
                signupForm.style.display = 'block';
                loginBtnTab.classList.remove('active');
                signupBtnTab.classList.add('active');
                isLoginMode = false;
            } else {
                signupForm.style.display = 'none';
                loginForm.style.display = 'block';
                signupBtnTab.classList.remove('active');
                loginBtnTab.classList.add('active');
                isLoginMode = true;
            }
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
        }

        // Validate username (min 3 chars, alphanumeric + underscore)
        function validateUsername(username) {
            const isValid = username && username.length >= 3;
            const usernameReq = document.getElementById('usernameLengthReq');
            if (usernameReq) {
                usernameReq.className = isValid ? 'requirement valid' : 'requirement invalid';
            }
            return isValid;
        }

        // Password validation
        function validatePassword(password) {
            const requirements = {
                length: password.length >= 6,
                uppercase: /[A-Z]/.test(password),
                number: /[0-9]/.test(password)
            };
            
            const reqLength = document.getElementById('reqLength');
            const reqUppercase = document.getElementById('reqUppercase');
            const reqNumber = document.getElementById('reqNumber');
            
            if (reqLength) reqLength.className = requirements.length ? 'requirement valid' : 'requirement invalid';
            if (reqUppercase) reqUppercase.className = requirements.uppercase ? 'requirement valid' : 'requirement invalid';
            if (reqNumber) reqNumber.className = requirements.number ? 'requirement valid' : 'requirement invalid';
            
            return requirements.length && requirements.uppercase && requirements.number;
        }

        // Toggle password visibility
        function setupPasswordToggle(inputId, toggleId) {
            const input = document.getElementById(inputId);
            const toggle = document.getElementById(toggleId);
            if (!input || !toggle) return;
            toggle.addEventListener('click', function() {
                if (input.type === 'password') {
                    input.type = 'text';
                    toggle.className = 'fas fa-eye-slash input-icon';
                } else {
                    input.type = 'password';
                    toggle.className = 'fas fa-eye input-icon';
                }
            });
        }

        // Login handler
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const loginSubmitBtn = document.getElementById('loginSubmitBtn');
            
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            
            const originalText = loginSubmitBtn.innerHTML;
            loginSubmitBtn.innerHTML = '<div class="loading-spinner"></div> Signing in...';
            loginSubmitBtn.disabled = true;
            
            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) throw error;
                
                successMessage.textContent = '✨ Login successful! Redirecting to Bantu Stream Connect...';
                successMessage.style.display = 'block';
                loginSubmitBtn.innerHTML = '<div class="loading-spinner"></div> Redirecting...';
                
                setTimeout(() => redirectToTarget(), 1500);
            } catch (error) {
                console.error('Login error:', error);
                let errorMsg = 'Failed to sign in. Please check your credentials.';
                if (error.message.includes('Invalid login credentials')) errorMsg = 'Invalid email or password. Please try again.';
                else if (error.message.includes('Email not confirmed')) errorMsg = 'Please confirm your email before logging in.';
                else if (error.message.includes('rate limit')) errorMsg = 'Too many attempts. Please try again in a few minutes.';
                
                errorMessage.textContent = errorMsg;
                errorMessage.style.display = 'block';
                loginSubmitBtn.innerHTML = originalText;
                loginSubmitBtn.disabled = false;
            }
        });

        // SIGNUP HANDLER with username and creator table insert
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('signupConfirmPassword').value;
            const username = document.getElementById('signupUsername').value.trim().toLowerCase();
            const signupSubmitBtn = document.getElementById('signupSubmitBtn');
            
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            
            // Validate username
            if (!username || username.length < 3) {
                errorMessage.textContent = 'Username must be at least 3 characters.';
                errorMessage.style.display = 'block';
                document.getElementById('signupUsername').focus();
                return;
            }
            
            // Username pattern: letters, numbers, underscore only
            if (!/^[a-zA-Z0-9_]+$/.test(username)) {
                errorMessage.textContent = 'Username can only contain letters, numbers, and underscores.';
                errorMessage.style.display = 'block';
                document.getElementById('signupUsername').focus();
                return;
            }
            
            if (password !== confirmPassword) {
                errorMessage.textContent = 'Passwords do not match.';
                errorMessage.style.display = 'block';
                document.getElementById('signupConfirmPassword').focus();
                return;
            }
            
            if (!validatePassword(password)) {
                errorMessage.textContent = 'Password does not meet requirements.';
                errorMessage.style.display = 'block';
                document.getElementById('signupPassword').focus();
                return;
            }
            
            const originalText = signupSubmitBtn.innerHTML;
            signupSubmitBtn.innerHTML = '<div class="loading-spinner"></div> Creating account...';
            signupSubmitBtn.disabled = true;
            
            try {
                // STEP 1: Create Auth user with username in metadata
                const { data: authData, error: authError } = await supabaseClient.auth.signUp({
                    email,
                    password,
                    options: {
                        emailRedirectTo: TARGET_REDIRECT_URL,
                        data: { username: username }
                    }
                });
                
                if (authError) throw authError;
                
                const user = authData.user;
                
                // STEP 2: Insert into creators table (critical fix)
                if (user) {
                    const { error: creatorError } = await supabaseClient
                        .from('creators')
                        .insert([{
                            id: user.id,
                            email: email,
                            username: username,
                            auth_uid: user.id
                        }]);
                    
                    if (creatorError) {
                        // If duplicate username error, provide helpful message
                        if (creatorError.message && creatorError.message.includes('duplicate')) {
                            throw new Error('Username already taken. Please choose another.');
                        }
                        throw creatorError;
                    }
                }
                
                successMessage.innerHTML = `
                    <i class="fas fa-check-circle"></i> 
                    Account created successfully!<br>
                    <small>Please verify your email. After verification, you'll be redirected to Bantu Stream Connect.</small>
                `;
                successMessage.style.display = 'block';
                signupSubmitBtn.innerHTML = '<div class="loading-spinner"></div> Check your email...';
                
                // Clear form
                document.getElementById('signupUsername').value = '';
                document.getElementById('signupEmail').value = '';
                document.getElementById('signupPassword').value = '';
                document.getElementById('signupConfirmPassword').value = '';
                
                setTimeout(() => {
                    toggleFormMode();
                    signupSubmitBtn.innerHTML = originalText;
                    signupSubmitBtn.disabled = false;
                }, 3000);
                
            } catch (error) {
                console.error('Signup error:', error);
                let errorMsg = 'Signup failed. Try again.';
                if (error.message.includes('Username already taken')) {
                    errorMsg = 'Username already taken. Please choose another.';
                } else if (error.message.includes('User already registered')) {
                    errorMsg = 'An account with this email already exists. Please sign in instead.';
                } else if (error.message.includes('password')) {
                    errorMsg = 'Password is too weak. Please use a stronger password.';
                } else if (error.message.includes('email')) {
                    errorMsg = 'Please enter a valid email address.';
                } else if (error.message.includes('duplicate key value violates unique constraint')) {
                    errorMsg = 'Username already exists. Please choose a different username.';
                }
                
                errorMessage.textContent = errorMsg;
                errorMessage.style.display = 'block';
                signupSubmitBtn.innerHTML = originalText;
                signupSubmitBtn.disabled = false;
            }
        });

        // OAuth handlers
        document.getElementById('googleLogin').addEventListener('click', async () => {
            const googleBtn = document.getElementById('googleLogin');
            const originalText = googleBtn.innerHTML;
            googleBtn.innerHTML = '<div class="loading-spinner"></div> Connecting...';
            googleBtn.disabled = true;
            try {
                const { error } = await supabaseClient.auth.signInWithOAuth({
                    provider: 'google',
                    options: { redirectTo: TARGET_REDIRECT_URL }
                });
                if (error) throw error;
            } catch (error) {
                console.error('Google login error:', error);
                errorMessage.textContent = 'Google login failed. Please try again.';
                errorMessage.style.display = 'block';
                googleBtn.innerHTML = originalText;
                googleBtn.disabled = false;
            }
        });

        document.getElementById('githubLogin').addEventListener('click', async () => {
            const githubBtn = document.getElementById('githubLogin');
            const originalText = githubBtn.innerHTML;
            githubBtn.innerHTML = '<div class="loading-spinner"></div> Connecting...';
            githubBtn.disabled = true;
            try {
                const { error } = await supabaseClient.auth.signInWithOAuth({
                    provider: 'github',
                    options: { redirectTo: TARGET_REDIRECT_URL }
                });
                if (error) throw error;
            } catch (error) {
                console.error('GitHub login error:', error);
                errorMessage.textContent = 'GitHub login failed. Please try again.';
                errorMessage.style.display = 'block';
                githubBtn.innerHTML = originalText;
                githubBtn.disabled = false;
            }
        });

        // Real-time validations
        document.getElementById('signupUsername')?.addEventListener('input', function(e) {
            validateUsername(e.target.value.trim());
        });
        
        document.getElementById('signupPassword')?.addEventListener('input', function(e) {
            validatePassword(e.target.value);
            const confirmPassword = document.getElementById('signupConfirmPassword').value;
            if (confirmPassword && e.target.value !== confirmPassword) {
                document.getElementById('signupConfirmPassword').style.borderColor = 'var(--error-color)';
            } else if (confirmPassword) {
                document.getElementById('signupConfirmPassword').style.borderColor = 'var(--success-color)';
            }
        });

        document.getElementById('signupConfirmPassword')?.addEventListener('input', function(e) {
            const password = document.getElementById('signupPassword').value;
            if (password && e.target.value !== password) {
                e.target.style.borderColor = 'var(--error-color)';
            } else if (password) {
                e.target.style.borderColor = 'var(--success-color)';
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loginBtnTab.addEventListener('click', toggleFormMode);
            signupBtnTab.addEventListener('click', toggleFormMode);
            setupPasswordToggle('loginPassword', 'toggleLoginPassword');
            setupPasswordToggle('signupPassword', 'toggleSignupPassword');
            setupPasswordToggle('signupConfirmPassword', 'toggleConfirmPassword');
            document.getElementById('loginEmail').focus();
            checkSession();
        });

        // Auth state change listener
        supabaseClient.auth.onAuthStateChange((event, session) => {
            console.log('Auth state changed:', event);
            if (event === 'SIGNED_IN' && session) {
                redirectToTarget();
            }
        });
    </script>
</body>
</html>
