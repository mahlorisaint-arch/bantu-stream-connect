<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Login - Bantu Stream Connect</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --deep-black: #0A0E12;
            --deep-navy: #0F172A;
            --soft-white: #F8FAFC;
            --slate-grey: #94A3B8;
            --bantu-blue: #1D4ED8;
            --warm-gold: #F59E0B;
            --error-color: #EF4444;
            --success-color: #10B981;
            --glow-cycle-1: #00A3FF;
            --glow-cycle-2: #0066FF;
            --glow-cycle-3: #8B5CF6;
            --glow-cycle-4: #EC4899;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--deep-black);
            color: var(--soft-white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .animated-bg {
            position: fixed;
            inset: 0;
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
        }

        .glow-cycle {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.1;
            animation: float 8s infinite ease-in-out;
        }

        .glow-1 {
            width: 400px;
            height: 400px;
            background: var(--glow-cycle-1);
            top: 10%;
            left: 5%;
        }

        .glow-2 {
            width: 300px;
            height: 300px;
            background: var(--glow-cycle-2);
            top: 60%;
            right: 10%;
        }

        .glow-3 {
            width: 350px;
            height: 350px;
            background: var(--glow-cycle-3);
            bottom: 10%;
            left: 20%;
        }

        .glow-4 {
            width: 250px;
            height: 250px;
            background: var(--glow-cycle-4);
            top: 20%;
            right: 20%;
        }

        @keyframes float {
            0%,100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }

        .login-container {
            position: relative;
            z-index: 2;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 28px;
            background: linear-gradient(
                135deg,
                var(--soft-white) 0%,
                var(--bantu-blue) 50%,
                var(--warm-gold) 100%
            );
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-sub {
            font-size: 12px;
            color: var(--slate-grey);
            letter-spacing: 2px;
            margin-top: 5px;
        }

        .tagline {
            text-align: center;
            color: var(--slate-grey);
            margin-bottom: 30px;
            font-size: 14px;
            font-style: italic;
            border-top: 1px solid rgba(148, 163, 184, 0.2);
            padding-top: 20px;
        }

        .mode-toggle {
            display: flex;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 25px;
        }

        .mode-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: var(--slate-grey);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 8px;
        }

        .mode-btn.active {
            background: linear-gradient(
                135deg,
                var(--bantu-blue),
                var(--warm-gold)
            );
            color: white;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 16px 45px 16px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(148,163,184,0.2);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--bantu-blue);
            box-shadow: 0 0 0 3px rgba(29,78,216,0.1);
        }

        .input-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--slate-grey);
            cursor: pointer;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
        }

        .btn-primary {
            background: linear-gradient(
                135deg,
                var(--bantu-blue),
                var(--warm-gold)
            );
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
        }

        .divider {
            text-align: center;
            margin: 25px 0;
            position: relative;
            color: var(--slate-grey);
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(148,163,184,0.2);
        }

        .divider span {
            background: rgba(15,23,42,0.85);
            padding: 0 20px;
            position: relative;
        }

        .social-login {
            display: grid;
            grid-template-columns: repeat(2,1fr);
            gap: 12px;
        }

        .social-btn {
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(148,163,184,0.2);
            background: rgba(255,255,255,0.05);
            color: white;
            cursor: pointer;
        }

        .error-message,
        .success-message {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .error-message {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.4);
            color: var(--error-color);
        }

        .success-message {
            background: rgba(16,185,129,0.15);
            border: 1px solid rgba(16,185,129,0.4);
            color: var(--success-color);
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .password-requirements {
            margin-top: 8px;
            font-size: 12px;
            color: var(--slate-grey);
        }

        .requirement {
            margin-bottom: 4px;
        }

        .requirement.valid {
            color: var(--success-color);
        }

        .social-note {
            margin-top: 15px;
            text-align: center;
            font-size: 12px;
            color: var(--warm-gold);
        }

        @media(max-width: 480px) {
            .login-container {
                padding: 28px 20px;
            }

            .social-login {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

<div class="animated-bg">
    <div class="glow-cycle glow-1"></div>
    <div class="glow-cycle glow-2"></div>
    <div class="glow-cycle glow-3"></div>
    <div class="glow-cycle glow-4"></div>
</div>

<div class="login-container">

    <div class="logo">
        <div class="logo-text">BANTU STREAM CONNECT</div>
        <div class="logo-sub">PULSE • CONNECT • STREAM</div>
    </div>

    <p class="tagline">"The African way baba, it's all in the DNA."</p>

    <div class="mode-toggle">
        <button class="mode-btn active" id="loginBtnTab">
            Sign In
        </button>

        <button class="mode-btn" id="signupBtnTab">
            Sign Up
        </button>
    </div>

    <div id="errorMessage" class="error-message"></div>
    <div id="successMessage" class="success-message"></div>

    <!-- LOGIN FORM -->
    <form id="loginForm">

        <div class="form-group">
            <label class="form-label">Email Address</label>

            <input
                type="email"
                class="form-input"
                id="loginEmail"
                placeholder="you@example.com"
                required
            >

            <i class="fas fa-envelope input-icon"></i>
        </div>

        <div class="form-group">
            <label class="form-label">Password</label>

            <input
                type="password"
                class="form-input"
                id="loginPassword"
                placeholder="Your password"
                required
            >

            <i class="fas fa-eye input-icon" id="toggleLoginPassword"></i>
        </div>

        <button type="submit" class="btn btn-primary" id="loginSubmitBtn">
            Sign In to Bantu Stream Connect
        </button>

    </form>

    <!-- SIGNUP FORM -->
    <form id="signupForm" style="display:none;">

        <div class="form-group">
            <label class="form-label">Full Name</label>

            <input
                type="text"
                class="form-input"
                id="signupFullName"
                placeholder="Enter your full name"
                required
            >

            <i class="fas fa-user input-icon"></i>
        </div>

        <div class="form-group">
            <label class="form-label">Email Address</label>

            <input
                type="email"
                class="form-input"
                id="signupEmail"
                placeholder="you@example.com"
                required
            >

            <i class="fas fa-envelope input-icon"></i>
        </div>

        <div class="form-group">
            <label class="form-label">Create Password</label>

            <input
                type="password"
                class="form-input"
                id="signupPassword"
                placeholder="Create a strong password"
                required
            >

            <i class="fas fa-eye input-icon" id="toggleSignupPassword"></i>

            <div class="password-requirements">
                <div class="requirement" id="reqLength">
                    • At least 6 characters
                </div>

                <div class="requirement" id="reqUppercase">
                    • One uppercase letter
                </div>

                <div class="requirement" id="reqNumber">
                    • One number
                </div>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Confirm Password</label>

            <input
                type="password"
                class="form-input"
                id="signupConfirmPassword"
                placeholder="Confirm your password"
                required
            >

            <i class="fas fa-eye input-icon" id="toggleConfirmPassword"></i>
        </div>

        <button type="submit" class="btn btn-primary" id="signupSubmitBtn">
            Create Bantu Stream Connect Account
        </button>

    </form>

    <div class="divider">
        <span>Or continue with</span>
    </div>

    <div class="social-login">

        <button class="social-btn" id="googleLogin">
            <i class="fab fa-google"></i> Google
        </button>

        <button class="social-btn" id="githubLogin">
            <i class="fab fa-github"></i> GitHub
        </button>

    </div>

    <p class="social-note">
        ⭐ Quick access with Google or GitHub
    </p>

</div>

<script>

    // SUPABASE
    const SUPABASE_URL = 'https://ydnxqnbjoshvxteevemc.supabase.co';

    const SUPABASE_ANON_KEY =
        'YOUR_SUPABASE_ANON_KEY';

    const supabaseClient =
        window.supabase.createClient(
            SUPABASE_URL,
            SUPABASE_ANON_KEY
        );

    const TARGET_REDIRECT_URL =
        'https://bantustreamconnect.com/';

    let isLoginMode = true;

    const loginBtnTab =
        document.getElementById('loginBtnTab');

    const signupBtnTab =
        document.getElementById('signupBtnTab');

    const loginForm =
        document.getElementById('loginForm');

    const signupForm =
        document.getElementById('signupForm');

    const errorMessage =
        document.getElementById('errorMessage');

    const successMessage =
        document.getElementById('successMessage');

    // FORM TOGGLE
    function toggleFormMode() {

        if (isLoginMode) {

            loginForm.style.display = 'none';
            signupForm.style.display = 'block';

            loginBtnTab.classList.remove('active');
            signupBtnTab.classList.add('active');

        } else {

            signupForm.style.display = 'none';
            loginForm.style.display = 'block';

            signupBtnTab.classList.remove('active');
            loginBtnTab.classList.add('active');
        }

        isLoginMode = !isLoginMode;

        errorMessage.style.display = 'none';
        successMessage.style.display = 'none';
    }

    // PASSWORD VALIDATION
    function validatePassword(password) {

        const requirements = {
            length: password.length >= 6,
            uppercase: /[A-Z]/.test(password),
            number: /[0-9]/.test(password)
        };

        document.getElementById('reqLength')
            .className = requirements.length
            ? 'requirement valid'
            : 'requirement';

        document.getElementById('reqUppercase')
            .className = requirements.uppercase
            ? 'requirement valid'
            : 'requirement';

        document.getElementById('reqNumber')
            .className = requirements.number
            ? 'requirement valid'
            : 'requirement';

        return (
            requirements.length &&
            requirements.uppercase &&
            requirements.number
        );
    }

    // PASSWORD TOGGLE
    function setupPasswordToggle(inputId, toggleId) {

        const input = document.getElementById(inputId);

        const toggle = document.getElementById(toggleId);

        toggle.addEventListener('click', () => {

            if (input.type === 'password') {
                input.type = 'text';
                toggle.className =
                    'fas fa-eye-slash input-icon';
            } else {
                input.type = 'password';
                toggle.className =
                    'fas fa-eye input-icon';
            }
        });
    }

    // USERNAME GENERATOR
    async function generateUniqueUsername(fullName) {

        const base = fullName
            .toLowerCase()
            .trim()
            .replace(/\s+/g, '_')
            .replace(/[^a-z0-9_]/g, '');

        let username;
        let exists = true;

        while (exists) {

            const randomDigits =
                Math.floor(1000 + Math.random() * 9000);

            username =
                `${base}_${randomDigits}`;

            const { data } =
                await supabaseClient
                    .from('user_profiles')
                    .select('username')
                    .eq('username', username)
                    .maybeSingle();

            exists = !!data;
        }

        return username;
    }

    // REDIRECT
    function redirectToTarget() {
        window.location.href =
            TARGET_REDIRECT_URL;
    }

    // LOGIN
    loginForm.addEventListener('submit', async (e) => {

        e.preventDefault();

        const email =
            document.getElementById('loginEmail').value;

        const password =
            document.getElementById('loginPassword').value;

        const loginSubmitBtn =
            document.getElementById('loginSubmitBtn');

        errorMessage.style.display = 'none';

        const originalText =
            loginSubmitBtn.innerHTML;

        loginSubmitBtn.innerHTML =
            '<div class="loading-spinner"></div> Signing in...';

        loginSubmitBtn.disabled = true;

        try {

            const { error } =
                await supabaseClient.auth.signInWithPassword({
                    email,
                    password
                });

            if (error) throw error;

            successMessage.innerHTML =
                '✨ Login successful! Redirecting...';

            successMessage.style.display = 'block';

            setTimeout(() => {
                redirectToTarget();
            }, 1500);

        } catch (error) {

            errorMessage.textContent =
                error.message || 'Login failed';

            errorMessage.style.display = 'block';

            loginSubmitBtn.innerHTML =
                originalText;

            loginSubmitBtn.disabled = false;
        }
    });

    // SIGNUP
    signupForm.addEventListener('submit', async (e) => {

        e.preventDefault();

        const fullName =
            document.getElementById('signupFullName')
                .value
                .trim();

        const email =
            document.getElementById('signupEmail')
                .value
                .trim();

        const password =
            document.getElementById('signupPassword')
                .value;

        const confirmPassword =
            document.getElementById('signupConfirmPassword')
                .value;

        const signupSubmitBtn =
            document.getElementById('signupSubmitBtn');

        errorMessage.style.display = 'none';

        successMessage.style.display = 'none';

        if (password !== confirmPassword) {

            errorMessage.textContent =
                'Passwords do not match';

            errorMessage.style.display = 'block';

            return;
        }

        if (!validatePassword(password)) {

            errorMessage.textContent =
                'Password does not meet requirements';

            errorMessage.style.display = 'block';

            return;
        }

        signupSubmitBtn.innerHTML =
            '<div class="loading-spinner"></div> Creating account...';

        signupSubmitBtn.disabled = true;

        try {

            // AUTO GENERATE USERNAME
            const username =
                await generateUniqueUsername(fullName);

            // CREATE AUTH USER
            const {
                data: authData,
                error: authError
            } = await supabaseClient.auth.signUp({

                email,
                password,

                options: {

                    emailRedirectTo:
                        TARGET_REDIRECT_URL,

                    data: {
                        full_name: fullName,
                        username: username
                    }
                }
            });

            if (authError) throw authError;

            const user = authData.user;

            if (!user) {
                throw new Error(
                    'User creation failed'
                );
            }

            // INSERT USER PROFILE
            const {
                error: profileError
            } = await supabaseClient
                .from('user_profiles')
                .insert([{

                    id: user.id,

                    email: email,

                    full_name: fullName,

                    username: username,

                    role: 'creator'
                }]);

            if (profileError) {
                throw profileError;
            }

            successMessage.innerHTML = `
                ✨ Account created successfully!<br><br>
                Your creator username:<br>
                <strong>@${username}</strong><br><br>
                Please verify your email.
            `;

            successMessage.style.display = 'block';

            signupForm.reset();

            signupSubmitBtn.innerHTML =
                'Check your email';

        } catch (error) {

            console.error(error);

            errorMessage.textContent =
                error.message || 'Signup failed';

            errorMessage.style.display = 'block';

            signupSubmitBtn.innerHTML =
                'Create Bantu Stream Connect Account';

            signupSubmitBtn.disabled = false;
        }
    });

    // PASSWORD VALIDATION REALTIME
    document.getElementById('signupPassword')
        .addEventListener('input', (e) => {
            validatePassword(e.target.value);
        });

    // GOOGLE LOGIN
    document.getElementById('googleLogin')
        .addEventListener('click', async () => {

            await supabaseClient.auth
                .signInWithOAuth({

                    provider: 'google',

                    options: {
                        redirectTo:
                            TARGET_REDIRECT_URL
                    }
                });
        });

    // GITHUB LOGIN
    document.getElementById('githubLogin')
        .addEventListener('click', async () => {

            await supabaseClient.auth
                .signInWithOAuth({

                    provider: 'github',

                    options: {
                        redirectTo:
                            TARGET_REDIRECT_URL
                    }
                });
        });

    // PASSWORD TOGGLES
    setupPasswordToggle(
        'loginPassword',
        'toggleLoginPassword'
    );

    setupPasswordToggle(
        'signupPassword',
        'toggleSignupPassword'
    );

    setupPasswordToggle(
        'signupConfirmPassword',
        'toggleConfirmPassword'
    );

    // FORM TOGGLE EVENTS
    loginBtnTab.addEventListener(
        'click',
        toggleFormMode
    );

    signupBtnTab.addEventListener(
        'click',
        toggleFormMode
    );

    // SESSION CHECK
    async function checkSession() {

        const {
            data: { session }
        } = await supabaseClient
            .auth
            .getSession();

        if (session) {
            redirectToTarget();
        }
    }

    checkSession();

    // AUTH LISTENER
    supabaseClient.auth.onAuthStateChange(
        (event, session) => {

            if (
                event === 'SIGNED_IN' &&
                session
            ) {
                redirectToTarget();
            }
        }
    );

</script>

</body>
</html>
